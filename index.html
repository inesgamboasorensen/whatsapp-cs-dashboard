    function ReminderCard() {
      const lastRun = new Date(runsMeta.lastRunDate);
      const today = new Date();
      const daysSince = Math.floor((today - lastRun) / (1000 * 60 * 60 * 24));
      const daysUntilNext = Math.max(0, 30 - daysSince);
      const overdue = daysUntilNext === 0;
      const soon = daysUntilNext <= 7 && !overdue;
      const color = overdue ? '#E8505B' : soon ? '#F97316' : '#2EC4B6';
      const bg = overdue ? 'from-coral/10 to-coral/5' : soon ? 'from-orange-100/60 to-orange-50/30' : 'from-teal/10 to-teal/5';
      const icon = overdue ? '🚨' : soon ? '⏰' : '📅';
      const message = overdue
        ? `Han pasado ${daysSince} días desde el último análisis. Hora de correr una nueva medición.`
        : soon
        ? `En ${daysUntilNext} días toca correr el próximo análisis.`

    function DonutChart({ data, size = 200, thickness = 28 }) {
      const radius = (size - thickness) / 2;
      const circumference = 2 * Math.PI * radius;
      const center = size / 2;
      let cumOffset = 0;

      return (
        <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
          {data.map((d, i) => {
            const dashLen = (d.pct / 100) * circumference;
            const offset = cumOffset;
            cumOffset += dashLen;
            return (
              <circle
                key={i} cx={center} cy={center} r={radius}
                fill="none" stroke={d.color} strokeWidth={thickness}
                strokeDasharray={`${dashLen} ${circumference - dashLen}`}
                strokeDashoffset={-offset}
                transform={`rotate(-90 ${center} ${center})`}
                className="donut-segment"
                style={{'--circumference': circumference, animationDelay: `${i * 0.15}s`}}
              />
            );
          })}
          <text x={center} y={center - 8} textAnchor="middle" fontSize="36" fontWeight="800" fill="#E8505B" dominantBaseline="middle">41%</text>
          <text x={center} y={center + 20} textAnchor="middle" fontSize="12" fill="#94A3B8">frustración</text>
        </svg>
      );

    function WritingQualitySection() {
      // Convert internal "errors score" (lower is better) to "calificación 0-100" (higher is better)

      const sorted = [...writingQuality].map(r => ({...r, grade: toGrade(r.score)})).sort((a, b) => b.grade - a.grade);
      const teamAvgTypos = (sorted.reduce((s, r) => s + r.typos, 0) / sorted.length).toFixed(1);
      const teamAvgAccents = (sorted.reduce((s, r) => s + r.missingAccents, 0) / sorted.length).toFixed(1);
      const teamAvgGrade = Math.round(sorted.reduce((s, r) => s + r.grade, 0) / sorted.length);
      const colorForGrade = (g) => g >= 85 ? '#2EC4B6' : g >= 70 ? '#22C55E' : g >= 55 ? '#F97316' : '#E8505B';
      const labelForGrade = (g) => g >= 85 ? 'Excelente' : g >= 70 ? 'Bueno' : g >= 55 ? 'Aceptable' : 'A mejorar';

      return (

              <div className="text-2xl font-extrabold text-teal">{sorted[0].agent}</div>

              <div className="text-2xl font-extrabold text-coral">{teamAvgTypos}</div>

                      {r.examples.good.map((e, j) => <li key={j} className="leading-snug">• {e}</li>)}
                    </ul>
                  </div>
                )}
              </div>
            ))}
          </div>

          {/* Methodology */}
          <div className="mt-8 bg-navy-dark rounded-xl p-5">
            <p className="text-teal text-sm font-bold mb-2">¿Cómo se calcula la calificación?</p>
            <div className="text-gray-300 text-xs leading-relaxed space-y-1">
              <p><strong className="text-white">Calificación = 100 − (errores ponderados × 1.2)</strong>, escala 0-100 donde 100 = perfecto.</p>
              <p>Ponderaciones del cálculo de errores: typos (×3) + sin acentos (×1) + ALL CAPS (×0.5) + inicio con minúscula (×0.3) + emojis excesivos (×5 si {'>'} 0.5/msg).</p>
              <p>Excluye nombres propios en mayúsculas (ej. "ISABEL GONZÁLEZ") y URLs. Solo considera mensajes del agente.</p>

            </div>
          </div>
        </Section>
      );

                  ))}
                </tbody>
              </table>
            </div>
            <div className="mt-4 flex gap-4 text-xs text-gray-500 flex-wrap">
              <span className="flex items-center gap-1.5"><span className="w-3 h-3 rounded-sm bg-teal"></span>Bajo 5 min</span>
              <span className="flex items-center gap-1.5"><span className="w-3 h-3 rounded-sm" style={{background: 'rgba(249,115,22,0.7)'}}></span>5-30 min</span>
              <span className="flex items-center gap-1.5"><span className="w-3 h-3 rounded-sm" style={{background: 'rgba(232,80,91,0.6)'}}></span>{'> 30 min'}</span>
            </div>
          </div>
        </Section>
      );
    }

    // Calls section — fetches live from Cloudflare Worker, auto-refreshes every 30s
    function CallsSection() {
      const [calls, setCalls] = React.useState(null);
      const [error, setError] = React.useState(null);
      const [lastUpdated, setLastUpdated] = React.useState(null);
      const [refreshing, setRefreshing] = React.useState(false);
      const [windowMode, setWindowMode] = React.useState('daily'); // 'daily' | 'weekly' | 'monthly'

      const fetchCalls = React.useCallback(() => {
        setRefreshing(true);
        fetch('https://delicate-poetry-a88a.ines-25d.workers.dev/whatsapp-calls', { cache: 'no-store' })
          .then(r => r.json())
          .then(d => {
            setCalls(d);
            setLastUpdated(new Date());
            setError(null);
          })
          .catch(e => setError(e.message))
          .finally(() => setRefreshing(false));
      }, []);

      React.useEffect(() => {
        fetchCalls();
        const interval = setInterval(fetchCalls, 30000); // 30s auto-refresh
        return () => clearInterval(interval);
      }, [fetchCalls]);

      if (error) {
        return (
          <Section title="Llamadas WhatsApp" id="calls">
            <div className="bg-white rounded-xl p-8 text-center">
              <p className="text-gray-500 text-sm">No se pudieron cargar las llamadas: {error}</p>
            </div>
          </Section>
        );
      }
      if (calls === null) {
        return (
          <Section title="Llamadas WhatsApp" id="calls">
            <div className="bg-white rounded-xl p-8 text-center">
              <p className="text-gray-500 text-sm">Cargando datos de llamadas...</p>
            </div>
          </Section>
        );
      }

      // Compute metrics
      const cleanInstance = (n) => (n || '').replace(/^Whats App /, '').replace(/^WhatsApp /, '');

      // Hora REAL de la llamada (no la del webhook). El webhook puede tardar
      // horas o días en re-emitir el evento si la cuenta estaba "offline".
      const callDate = (c) => new Date(c.raw?.data?.date || c.ts);

      // Horario laboral MoradaUno (hora CDMX): L-V 9-19, Sáb 9-15, Dom cerrado.
      // El navegador debe estar en TZ America/Mexico_City para que coincida.
      const isBusinessHours = (date) => {
        const day = date.getDay();
        const hour = date.getHours();
        if (day === 0) return false;
        if (day === 6) return hour >= 9 && hour < 15;
        return hour >= 9 && hour < 19;
      };

      // Decorate every call with parsed date + clean agent once
      const allCalls = calls.map(c => ({ ...c, _dt: callDate(c), _agent: cleanInstance(c.instance) }));

      const now = new Date();
      const cutoff30d = new Date(now.getTime() - 30 * 24 * 60 * 60 * 1000);
      const calls30d = allCalls.filter(c => c._dt >= cutoff30d);

      // ── KPIs últimos 30 días ─────────────────────────────────────────
      const total30d = calls30d.length;
      const missed30d = calls30d.filter(c => c.missed).length;
      const missedRate30d = total30d ? (missed30d / total30d * 100).toFixed(1) : '0';
      const bizHours30d = calls30d.filter(c => isBusinessHours(c._dt)).length;
      const bizHoursRate30d = total30d ? (bizHours30d / total30d * 100).toFixed(0) : '0';

      // ── Ventana del toggle (daily/weekly/monthly) ────────────────────
      // daily   → últimos 30 días, 1 barra por día
      // weekly  → últimas 12 semanas (lunes-domingo CDMX), 1 barra por semana
      // monthly → últimos 6 meses, 1 barra por mes
      const startOfDay = (d) => { const x = new Date(d); x.setHours(0,0,0,0); return x; };
      const startOfWeek = (d) => {
        const x = startOfDay(d);
        const day = x.getDay(); // 0=Sun
        const diff = (day === 0 ? -6 : 1 - day); // back to Monday
        x.setDate(x.getDate() + diff);
        return x;
      };
      const startOfMonth = (d) => { const x = new Date(d); x.setDate(1); x.setHours(0,0,0,0); return x; };
      const addDays = (d, n) => { const x = new Date(d); x.setDate(x.getDate() + n); return x; };
      const addMonths = (d, n) => { const x = new Date(d); x.setMonth(x.getMonth() + n); return x; };

      let windowStart, buckets;
      if (windowMode === 'daily') {
        windowStart = addDays(startOfDay(now), -29);
        buckets = Array.from({length: 30}, (_, i) => {
          const s = addDays(windowStart, i);
          const e = addDays(s, 1);
          return { start: s, end: e, label: s.toLocaleDateString('es-MX', { day: '2-digit', month: 'short', timeZone: 'America/Mexico_City' }) };
        });
      } else if (windowMode === 'weekly') {
        windowStart = addDays(startOfWeek(now), -7 * 11);
        buckets = Array.from({length: 12}, (_, i) => {
          const s = addDays(windowStart, i * 7);
          const e = addDays(s, 7);
          return { start: s, end: e, label: s.toLocaleDateString('es-MX', { day: '2-digit', month: 'short', timeZone: 'America/Mexico_City' }) };
        });
      } else {
        windowStart = addMonths(startOfMonth(now), -5);
        buckets = Array.from({length: 6}, (_, i) => {
          const s = addMonths(windowStart, i);
          const e = addMonths(s, 1);
          return { start: s, end: e, label: s.toLocaleDateString('es-MX', { month: 'short', year: '2-digit', timeZone: 'America/Mexico_City' }) };
        });
      }
      const callsWindow = allCalls.filter(c => c._dt >= windowStart && c._dt < buckets[buckets.length - 1].end);

      // Series de tiempo: cada bucket con totales + perdidas
      buckets.forEach(b => { b.total = 0; b.missed = 0; });
      callsWindow.forEach(c => {
        for (const b of buckets) {
          if (c._dt >= b.start && c._dt < b.end) {
            b.total++;
            if (c.missed) b.missed++;
            break;
          }
        }
      });

      // Por agente en la ventana seleccionada
      const byAgentWin = {};
      callsWindow.forEach(c => {
        const a = c._agent;
        if (!byAgentWin[a]) byAgentWin[a] = { total: 0, missed: 0 };
        byAgentWin[a].total++;
        if (c.missed) byAgentWin[a].missed++;
      });
      const agentRows = Object.entries(byAgentWin)
        .map(([agent, s]) => ({
          agent,
          total: s.total,
          missed: s.missed,
          answered: s.total - s.missed,
          missedRate: s.total ? (s.missed / s.total * 100) : 0,
        }))
        .sort((a, b) => b.total - a.total);
      const maxAgentTotal = Math.max(1, ...agentRows.map(a => a.total));

      // ── Datos que siguen usando TODAS las llamadas (no afectados por toggle) ─
      const byHour = Array.from({length: 24}, () => ({total: 0, missed: 0}));
      const byClient = {};
      allCalls.forEach(c => {
        const hour = c._dt.getHours();
        if (hour >= 0 && hour < 24) {
          byHour[hour].total++;
          if (c.missed) byHour[hour].missed++;
        }
        if (c.remote) {
          if (!byClient[c.remote]) byClient[c.remote] = { total: 0, missed: 0, agents: new Set(), lastCall: c._dt };
          byClient[c.remote].total++;
          if (c.missed) byClient[c.remote].missed++;
          byClient[c.remote].agents.add(c._agent);
          if (c._dt > byClient[c.remote].lastCall) byClient[c.remote].lastCall = c._dt;
        }
      });

      const totalCalls = allCalls.length;

      const recentCalls = [...allCalls]
        .sort((a, b) => b._dt - a._dt)
        .slice(0, 20);

      const fmtMxTime = (d) => d.toLocaleString('es-MX', {
        weekday: 'short', day: '2-digit', month: 'short',
        hour: '2-digit', minute: '2-digit', hour12: false,
        timeZone: 'America/Mexico_City',
      });

      const repeatCallers = Object.entries(byClient)
        .filter(([_, v]) => v.total >= 3)
        .sort((a, b) => b[1].total - a[1].total)
        .slice(0, 10);

      const empty = totalCalls === 0;
      const maxBucketTotal = Math.max(1, ...buckets.map(b => b.total));
      const windowMissed = callsWindow.filter(c => c.missed).length;
      const windowMissedRate = callsWindow.length ? (windowMissed / callsWindow.length * 100) : 0;
      const windowLabel = windowMode === 'daily' ? 'Últimos 30 días'
                        : windowMode === 'weekly' ? 'Últimas 12 semanas'
                        : 'Últimos 6 meses';

      const lastUpdatedStr = lastUpdated ? lastUpdated.toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit', second: '2-digit' }) : '—';
      return (
        <Section title="Llamadas WhatsApp" id="calls">
          <div className="bg-white rounded-xl p-4 mb-6 border border-teal/20 flex items-center justify-between flex-wrap gap-3">
            <p className="text-xs text-gray-600">
              📡 Live data · {totalCalls} llamadas registradas
              <span className="ml-3 text-gray-400">Actualizado: {lastUpdatedStr}</span>
              <span className="ml-3 inline-flex items-center gap-1 text-teal">
                <span className={`w-2 h-2 rounded-full bg-teal ${refreshing ? 'animate-pulse' : ''}`}></span>
                Auto-refresh 30s
              </span>
            </p>
            <button
              onClick={fetchCalls}
              disabled={refreshing}
              className="text-xs bg-teal/10 hover:bg-teal/20 text-teal font-semibold px-3 py-1.5 rounded-md transition-colors disabled:opacity-50"
            >
              {refreshing ? 'Actualizando...' : '↻ Refrescar ahora'}
            </button>
          </div>

          {empty && (
            <div className="bg-white rounded-xl p-12 text-center">
              <div className="text-5xl mb-3">📞</div>
              <p className="text-gray-700 font-bold mb-1">Esperando datos de llamadas</p>
              <p className="text-gray-500 text-sm max-w-md mx-auto">El webhook está activo. Los datos aparecerán aquí en cuanto entren las primeras llamadas a las cuentas conectadas.</p>
            </div>
          )}

          {!empty && (
            <>
              {/* Banner de limitaciones del webhook */}
              <div className="bg-orange-50 border border-orange-200 rounded-xl p-4 mb-6 text-xs text-orange-900 leading-relaxed">
                <p className="font-bold mb-1.5">⚠️ Qué sabemos y qué no</p>
                <p>
                  <strong>Sí tenemos:</strong> quién llamó, a qué agente, hora real CDMX, si fue audio o video, y el resultado (perdida, rechazada, contestada).
                  {' '}<strong>No tenemos:</strong> la duración exacta de la llamada ni si el agente devolvió la llamada.
                </p>
              </div>

              {/* KPI cards — siempre últimos 30 días */}
              <div className="flex items-center justify-between mb-3">
                <h3 className="text-xs font-semibold uppercase tracking-wider text-gray-500">Resumen · Últimos 30 días</h3>
                <span className="text-xs text-gray-400">{total30d} llamadas registradas</span>
              </div>
              <div className="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-8">
                <div className="bg-white rounded-xl p-5 shadow-sm" style={{borderLeft: '4px solid #2EC4B6'}}>
                  <div className="text-3xl mb-1">📞</div>
                  <div className="text-3xl font-extrabold text-navy-dark">{total30d}</div>
                  <div className="text-xs text-gray-500 mt-1">Total llamadas · 30d</div>
                </div>
                <div className="bg-white rounded-xl p-5 shadow-sm" style={{borderLeft: '4px solid #E8505B'}}>
                  <div className="text-3xl mb-1">❌</div>
                  <div className="text-3xl font-extrabold text-coral">{missedRate30d}%</div>
                  <div className="text-xs text-gray-500 mt-1">Perdidas · {missed30d} de {total30d}</div>
                </div>
                <div className="bg-white rounded-xl p-5 shadow-sm" style={{borderLeft: '4px solid #F97316'}}>
                  <div className="text-3xl mb-1">🕘</div>
                  <div className="text-3xl font-extrabold text-orange-500">{bizHoursRate30d}%</div>
                  <div className="text-xs text-gray-500 mt-1">En horario laboral · {bizHours30d} de {total30d}</div>
                </div>
              </div>

              {/* Toggle D/W/M + bloques que dependen de él */}
              <div className="flex items-center justify-between mb-3 flex-wrap gap-2">
                <h3 className="text-xs font-semibold uppercase tracking-wider text-gray-500">Volumen y perdidas · {windowLabel}</h3>
                <div className="inline-flex bg-gray-100 rounded-lg p-1 text-xs font-semibold">
                  {[['daily','Diaria'],['weekly','Semanal'],['monthly','Mensual']].map(([k, label]) => (
                    <button key={k} onClick={() => setWindowMode(k)}
                      className={`px-3 py-1.5 rounded-md transition-colors ${windowMode === k ? 'bg-white text-navy-dark shadow-sm' : 'text-gray-500 hover:text-navy-dark'}`}>
                      {label}
                    </button>
                  ))}
                </div>
              </div>

              {/* Time series — volumen total con perdidas en coral */}
              <div className="bg-white rounded-xl p-6 shadow-sm mb-6">
                <div className="flex items-baseline justify-between mb-1 flex-wrap gap-2">
                  <h4 className="font-bold text-navy-dark">📊 Volumen de llamadas</h4>
                  <div className="text-xs text-gray-500">
                    <span className="font-bold text-navy-dark">{callsWindow.length}</span> totales ·
                    <span className="font-bold text-coral ml-1">{windowMissedRate.toFixed(0)}%</span> perdidas
                  </div>
                </div>
                <div className="flex items-center gap-4 text-xs text-gray-600 mb-4">
                  <span className="inline-flex items-center gap-1.5"><span className="w-3 h-3 rounded-sm bg-coral"></span> Perdidas</span>
                  <span className="inline-flex items-center gap-1.5"><span className="w-3 h-3 rounded-sm bg-teal"></span> Contestadas</span>
                </div>
                {(() => {
                  const chartH = 200;
                  return (
                    <>
                      <div className="relative" style={{height: `${chartH}px`}}>
                        <div className="relative flex items-end gap-1 h-full">
                          {buckets.map((b, i) => {
                            const total = b.total;
                            const missed = b.missed;
                            const answered = total - missed;
                            const totalH = total ? Math.max(6, (total / maxBucketTotal) * chartH) : 2;
                            const missedH = total ? (missed / total) * totalH : 0;
                            const answeredH = total ? (answered / total) * totalH : 0;
                            const missedPct = total ? Math.round((missed / total) * 100) : 0;
                            return (
                              <div key={i} className="flex-1 flex flex-col items-center justify-end relative group">
                                {total > 0 && (
                                  <div className="absolute -top-5 text-[10px] font-bold text-navy-dark">{total}</div>
                                )}
                                <div className="w-full flex flex-col-reverse rounded-t overflow-hidden" style={{height: `${totalH}px`, opacity: total ? 1 : 0.15}}
                                     title={`${b.label}: ${total} totales · ${missed} perdidas (${missedPct}%)`}>
                                  {answered > 0 && (
                                    <div style={{height: `${answeredH}px`, backgroundColor: '#2EC4B6'}}></div>
                                  )}
                                  {missed > 0 && (
                                    <div className="flex items-center justify-center" style={{height: `${missedH}px`, backgroundColor: '#E8505B'}}>
                                      {missedH >= 18 && (
                                        <span className="text-[10px] font-bold text-white">{missedPct}%</span>
                                      )}
                                    </div>
                                  )}
                                </div>
                              </div>
                            );
                          })}
                        </div>
                      </div>
                      <div className="flex gap-1 mt-2 text-[10px] text-gray-500">
                        {buckets.map((b, i) => {
                          // Espaciar etiquetas si hay muchas barras
                          const step = buckets.length > 15 ? Math.ceil(buckets.length / 8) : 1;
                          const show = i % step === 0 || i === buckets.length - 1;
                          return (
                            <div key={i} className="flex-1 text-center whitespace-nowrap overflow-hidden">
                              {show ? b.label : ''}
                            </div>
                          );
                        })}
                      </div>
                    </>
                  );
                })()}
              </div>

              <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                {/* Per-agent stacked horizontal bars: largo = volumen, color = perdidas vs contestadas */}
                <div className="bg-white rounded-xl p-6 shadow-sm">
                  <h3 className="font-bold text-navy-dark mb-1">📞 Llamadas por Agente</h3>
                  <p className="text-xs text-gray-500 mb-4">Largo de la barra = volumen real · Coral = perdidas, Teal = contestadas</p>
                  <div className="flex items-center gap-4 text-[11px] text-gray-600 mb-3">
                    <span className="inline-flex items-center gap-1.5"><span className="w-3 h-3 rounded-sm bg-coral"></span> Perdidas</span>
                    <span className="inline-flex items-center gap-1.5"><span className="w-3 h-3 rounded-sm bg-teal"></span> Contestadas</span>
                  </div>
                  {agentRows.length === 0 ? (
                    <p className="text-gray-400 text-sm py-6 text-center">Sin llamadas en esta ventana.</p>
                  ) : (
                    <div className="space-y-3">
                      {agentRows.map((a, i) => {
                        const widthPct = (a.total / maxAgentTotal) * 100;
                        const missedPct = a.total ? (a.missed / a.total) * 100 : 0;
                        const answeredPct = 100 - missedPct;
                        return (
                          <div key={i}>
                            <div className="flex justify-between items-baseline text-sm mb-1">
                              <span className="font-medium truncate mr-2">{a.agent}</span>
                              <span className="text-xs whitespace-nowrap">
                                <span className="font-bold text-navy-dark">{a.total}</span>
                                <span className="text-gray-400 mx-1">·</span>
                                <span className="font-bold" style={{color: a.missedRate > 50 ? '#E8505B' : a.missedRate > 25 ? '#F97316' : '#2EC4B6'}}>{a.missedRate.toFixed(0)}% perdidas</span>
                              </span>
                            </div>
                            <div className="w-full bg-gray-50 rounded h-6 overflow-hidden">
                              <div className="flex h-6 rounded overflow-hidden" style={{width: `${widthPct}%`}}
                                   title={`${a.agent}: ${a.total} totales · ${a.missed} perdidas (${a.missedRate.toFixed(0)}%)`}>
                                {answeredPct > 0 && (
                                  <div className="h-full" style={{width: `${answeredPct}%`, backgroundColor: '#2EC4B6'}}></div>

                                {missedPct > 0 && (
                                  <div className="h-full" style={{width: `${missedPct}%`, backgroundColor: '#E8505B'}}></div>

                              </div>
                            </div>
                          </div>

                      })}
                    </div>
                  )}
                </div>

                {/* Hours of day — stacked bars (missed vs answered) */}
                <div className="bg-white rounded-xl p-6 shadow-sm">

                  <div className="flex items-center gap-4 text-xs text-gray-600 mb-4">

                    <span className="inline-flex items-center gap-1.5"><span className="w-3 h-3 rounded-sm bg-teal"></span> Contestadas</span>

    // ── Per-agent structured feedback (auto-generated from metrics) ─────────
    // Returns an object with: grade, strengths[], improvements[], actions[], trend
    // callStats: optional { [firstName]: { totalBiz, missedBiz, missedBizRate } }
    function generateFeedback(agentName, callStats) {
      // Find the agent's data across all sources
      const ranking = agentRanking.find(a => a.name === agentName);
      const responseT = responseTimes.find(r => r.agent === agentName || r.agent === agentName.replace(/^Whats App /, ''));
      const writing = writingQuality.find(w => w.agent === agentName);
      const resolution = resolutionData.find(r => r.agent === agentName);
      const firstName = agentName.split(' ')[0].toLowerCase();
      const callRow = callStats ? (callStats[firstName] || null) : null;

      const strengths = [];
      const improvements = [];
      const actions = [];
      let trend = 'sin-datos';
      let trendNote = '';

      // === Frustration analysis ===
      const fAll = [ranking?.rate, ranking?.mar30, ranking?.may4, ranking?.may4pm, ranking?.may13, ranking?.jun2].filter(v => v !== null && v !== undefined);
      const latest = fAll[fAll.length - 1];
      const earliest = fAll[0];
      const frustHistory = fAll;

      if (latest !== undefined) {
        if (latest <= 15) strengths.push(`Tasa de frustración muy baja (${latest}%) — top tier del equipo`);
        else if (latest <= 25) strengths.push(`Tasa de frustración aceptable (${latest}%)`);
        else if (latest <= 40) improvements.push(`Tasa de frustración elevada (${latest}%) — revisar interacciones difíciles`);
        else improvements.push(`Tasa de frustración crítica (${latest}%) — atención inmediata`);

        if (fAll.length >= 2) {
          const delta = latest - earliest;
          if (delta <= -10) {
            trend = 'mejorando';
            trendNote = `Mejoró ${Math.abs(delta)} pts vs primera medición (${earliest}% → ${latest}%)`;
            strengths.push(`Tendencia positiva: ${trendNote}`);
          } else if (delta >= 10) {
            trend = 'empeorando';
            trendNote = `Subió ${delta} pts vs primera medición (${earliest}% → ${latest}%)`;
            improvements.push(`Tendencia negativa: ${trendNote}`);
          } else {
            trend = 'estable';
            trendNote = `Estable en ${latest}% (rango ${Math.min(...fAll)}-${Math.max(...fAll)}%)`;
          }
        } else {
          trend = 'inicial';
          trendNote = `Primera medición disponible: ${latest}%`;
        }
      }

      // === Response time analysis ===
      if (responseT) {
        if (responseT.median < 5) {
          strengths.push(`Mediana de respuesta excelente (${responseT.median.toFixed(1)} min)`);
        } else if (responseT.median < 15) {
          strengths.push(`Mediana de respuesta buena (${responseT.median.toFixed(1)} min)`);
        } else if (responseT.median < 30) {
          improvements.push(`Mediana de respuesta lenta (${responseT.median.toFixed(1)} min)`);
          actions.push('Apuntar a responder en menos de 15 min en horario laboral');
        } else {
          improvements.push(`Mediana de respuesta crítica (${responseT.median.toFixed(1)} min)`);
          actions.push('Revisar carga de trabajo o escalación — la mediana debería estar bajo 15 min');
        }

        if (responseT.under5 >= 60) strengths.push(`${responseT.under5}% de respuestas en menos de 5 min`);
        if (responseT.under30 < 70) improvements.push(`Solo ${responseT.under30}% responde en menos de 30 min`);
        if (responseT.avg > responseT.median * 5) {
          improvements.push(`Algunos brokers esperan mucho — promedio (${responseT.avg < 60 ? responseT.avg.toFixed(0) + ' min' : (responseT.avg/60).toFixed(1) + ' h'}) muy alto vs mediana`);
          actions.push('Identificar conversaciones que se quedan sin respuesta más de 1 hora');
        }
      }

      // === Writing quality analysis ===
      if (writing) {
        if (writing.score < 10) {
          strengths.push(`Escritura impecable (score ${writing.score}, ${writing.typos} typos por 100 msg)`);
        } else if (writing.score < 25) {
          // neutral
        } else {
          improvements.push(`Calidad de escritura a mejorar (score ${writing.score})`);
        }

        if (writing.typos > 2) {
          improvements.push(`${writing.typos} typos por cada 100 mensajes`);
          actions.push('Activar autocorrector de WhatsApp y revisar antes de enviar');
        }
        if (writing.lowerStart > 25) {
          improvements.push(`${writing.lowerStart}% de mensajes inician con minúscula`);
          actions.push('Iniciar siempre con mayúscula — proyecta más profesionalismo');
        }
        if (writing.missingAccents > 8) {
          improvements.push(`${writing.missingAccents}% de palabras sin acento`);
          actions.push('Habilitar teclado en español con acentos automáticos');
        }
        if (writing.emojiPerMsg > 0.5) {
          improvements.push(`Uso excesivo de emojis (${writing.emojiPerMsg}/mensaje)`);
        }
        if (writing.examples?.bad?.length > 0) {
          writing.examples.bad.forEach(b => improvements.push(b));
        }
      }

      // === Resolution effectiveness ===
      if (resolution) {
        if (resolution.resolvedPct >= 65) {
          strengths.push(`Alta tasa de resolución (${resolution.resolvedPct}% de conversaciones cerradas exitosamente)`);
        } else if (resolution.resolvedPct >= 50) {
          // neutral
        } else {
          improvements.push(`Tasa de resolución baja (${resolution.resolvedPct}%) — muchas conversaciones quedan sin cierre claro`);
          actions.push('Cerrar conversaciones con confirmación explícita ("¿queda algo más?", "te confirmo cuando quede listo")');
        }
        if (resolution.unresolvedPct >= 5) {
          improvements.push(`${resolution.unresolvedPct}% conversaciones terminan con el broker frustrado o sin solución`);
        }
        if (resolution.escalationPct > 50) {
          improvements.push(`${resolution.escalationPct}% de conversaciones requieren escalar a otro equipo — muchos cuellos de botella internos`);
          actions.push('Documentar qué casos se pueden resolver internamente para no escalar tanto');
        }
      }

      // === Calls (live webhook) — % perdidas en horario laboral ===
      if (callRow && callRow.totalBiz > 0) {
        const rate = Math.round(callRow.missedBiz / callRow.totalBiz * 100);
        if (rate <= 10) {
          strengths.push(`Disponibilidad telefónica alta (${rate}% perdidas en horario laboral · ${callRow.missedBiz}/${callRow.totalBiz})`);
        } else if (rate <= 25) {
          // neutral
        } else if (rate <= 50) {
          improvements.push(`${rate}% de llamadas perdidas en horario laboral (${callRow.missedBiz}/${callRow.totalBiz})`);
          actions.push('Revisar disponibilidad o redirigir llamadas cuando esté ocupado');
        } else {
          improvements.push(`Tasa crítica de llamadas perdidas en horario laboral: ${rate}% (${callRow.missedBiz}/${callRow.totalBiz})`);
          actions.push('Más de la mitad de las llamadas no se contestan en horario laboral — atención inmediata');
        }
      }

      // === Coverage / data freshness ===
      const today = new Date().toISOString().slice(0, 10);
      if (ranking?.lastSeen) {
        const daysSince = Math.floor((new Date(today) - new Date(ranking.lastSeen)) / (1000 * 60 * 60 * 24));
        if (daysSince > 14) {
          improvements.push(`Sin datos recientes desde ${ranking.lastSeen} (${daysSince} días)`);
          actions.push('Reconectar la cuenta de WhatsApp en Evolution API');
        }
      }

      return {
        strengths, improvements, actions,
        trend, trendNote,
        frustHistory,
        hasResponseData: !!responseT,
        hasWritingData: !!writing,
        responseT, writing, ranking, callRow,
      };
    }

    // Helper: read a metric for an agent and return { value, displayValue, color, label, ok }
    // callStats: optional { [firstName]: { totalBiz, missedBiz, missedBizRate } } from FeedbackSection
    function getMetrics(agentName, callStats) {
      const ranking = agentRanking.find(a => a.name === agentName);
      const responseT = responseTimes.find(r => r.agent === agentName || r.agent === agentName.replace(/^Whats App /, ''));
      const writing = writingQuality.find(w => w.agent === agentName);
      const resolution = resolutionData.find(r => r.agent === agentName);

      // Frustration: latest available
      const fAll = ranking ? [ranking.rate, ranking.mar30, ranking.may4, ranking.may4pm, ranking.may13, ranking.jun2].filter(v => v !== null && v !== undefined) : [];
      const frustration = fAll.length ? fAll[fAll.length - 1] : null;

      // Calls: aggregate from live data, matching agent first name to instance
      const firstName = agentName.split(' ')[0].toLowerCase();
      const callRow = callStats ? (callStats[firstName] || null) : null;
      const callsBizMissedRate = (callRow && callRow.totalBiz > 0) ? Math.round(callRow.missedBiz / callRow.totalBiz * 100) : null;

      const colorByFrust = (v) => v === null ? '#94A3B8' : v <= 15 ? '#2EC4B6' : v <= 30 ? '#22C55E' : v <= 45 ? '#F97316' : '#E8505B';
      const colorByResp  = (v) => v === null ? '#94A3B8' : v < 5 ? '#2EC4B6' : v < 15 ? '#22C55E' : v < 30 ? '#F97316' : '#E8505B';
      const colorByGrade = (g) => g === null ? '#94A3B8' : g >= 85 ? '#2EC4B6' : g >= 70 ? '#22C55E' : g >= 55 ? '#F97316' : '#E8505B';
      const colorByRes   = (v) => v === null ? '#94A3B8' : v >= 65 ? '#2EC4B6' : v >= 50 ? '#22C55E' : v >= 35 ? '#F97316' : '#E8505B';
      const colorByMiss  = (v) => v === null ? '#94A3B8' : v <= 10 ? '#2EC4B6' : v <= 25 ? '#22C55E' : v <= 50 ? '#F97316' : '#E8505B';

      const writingGrade = writing ? Math.max(0, Math.min(100, Math.round(100 - writing.score * 1.2))) : null;

      return {
        ranking, responseT, writing, resolution, callRow,
        frustration: { value: frustration, color: colorByFrust(frustration), display: frustration !== null ? `${frustration}%` : '—' },
        responseTime: { value: responseT?.median ?? null, color: colorByResp(responseT?.median ?? null),
          display: responseT ? (responseT.median < 60 ? `${responseT.median.toFixed(1)} min` : `${(responseT.median/60).toFixed(1)} h`) : '—' },
        writingGrade: { value: writingGrade, color: colorByGrade(writingGrade), display: writingGrade !== null ? `${writingGrade}/100` : '—' },
        resolutionPct: { value: resolution?.resolvedPct ?? null, color: colorByRes(resolution?.resolvedPct ?? null),
          display: resolution ? `${resolution.resolvedPct}%` : '—' },
        callsBizMissed: {
          value: callsBizMissedRate,
          color: colorByMiss(callsBizMissedRate),
          display: callsBizMissedRate !== null ? `${callsBizMissedRate}%` : '—',
          sub: callRow ? `${callRow.missedBiz}/${callRow.totalBiz} en horario` : 'sin datos',
        },
      };
    }

    // Convierte cada métrica disponible a un score 0-100 y promedia para sacar la calificación
    function gradeFromMetrics(m) {
      const scores = [];
      if (m.frustration.value !== null) scores.push({ key: 'frustración', s: Math.max(0, Math.min(100, 100 - m.frustration.value * 2)) });
      if (m.resolutionPct.value !== null) scores.push({ key: 'resolución', s: m.resolutionPct.value });
      if (m.responseTime.value !== null) {
        const med = m.responseTime.value;
        const s = med < 5 ? 100 : med < 15 ? 80 : med < 30 ? 60 : med < 60 ? 40 : 20;
        scores.push({ key: 'respuesta', s });
      }
      if (m.writingGrade.value !== null) scores.push({ key: 'escritura', s: m.writingGrade.value });
      if (m.callsBizMissed.value !== null) scores.push({ key: 'llamadas', s: 100 - m.callsBizMissed.value });

      if (scores.length === 0) return { grade: '—', gradeColor: '#94A3B8', gradeLabel: 'Sin datos suficientes', score: null, scores };
      const avg = Math.round(scores.reduce((s, x) => s + x.s, 0) / scores.length);
      let grade, gradeColor, gradeLabel;
      if (avg >= 85)      { grade = 'A'; gradeColor = '#2EC4B6'; gradeLabel = 'Excelente desempeño'; }
      else if (avg >= 70) { grade = 'B'; gradeColor = '#22C55E'; gradeLabel = 'Buen desempeño'; }
      else if (avg >= 55) { grade = 'C'; gradeColor = '#F97316'; gradeLabel = 'Aceptable, oportunidades claras'; }
      else                { grade = 'D'; gradeColor = '#E8505B'; gradeLabel = 'Requiere atención y coaching'; }
      return { grade, gradeColor, gradeLabel, score: avg, scores };
    }

                <strong>Respuesta:</strong> mediana &lt;5min=100, &lt;15=80, &lt;30=60, &lt;60=40, ≥60=20 ·{' '}

              <p className="text-gray-400">Si una métrica no tiene dato, no se cuenta en el promedio.</p>

        </Section>
      );
    }

    // ── Correlaciones: frustración vs cada métrica ─────────────────────────
    // Pearson r y scatter por agente. Pensado para crecer con más data.
    function pearsonR(xs, ys) {
      const n = xs.length;
      if (n < 2) return null;
      const mx = xs.reduce((s, x) => s + x, 0) / n;
      const my = ys.reduce((s, y) => s + y, 0) / n;
      let cov = 0, sx = 0, sy = 0;
      for (let i = 0; i < n; i++) {
        const dx = xs[i] - mx, dy = ys[i] - my;
        cov += dx * dy; sx += dx * dx; sy += dy * dy;
      }
      const denom = Math.sqrt(sx * sy);
      return denom > 0 ? cov / denom : null;
    }

    function linearRegression(xs, ys) {
      const n = xs.length;
      if (n < 2) return null;
      const mx = xs.reduce((s, x) => s + x, 0) / n;
      const my = ys.reduce((s, y) => s + y, 0) / n;
      let num = 0, den = 0;
      for (let i = 0; i < n; i++) { num += (xs[i] - mx) * (ys[i] - my); den += (xs[i] - mx) ** 2; }
      if (den === 0) return null;
      const slope = num / den;
      const intercept = my - slope * mx;
      return { slope, intercept };
    }

    function ScatterChart({ title, xLabel, points, xMin, xMax, invertX }) {
      // points: [{ name, x, y }]
      const valid = points.filter(p => p.x !== null && p.x !== undefined && p.y !== null && p.y !== undefined);
      const xs = valid.map(p => p.x);
      const ys = valid.map(p => p.y);
      const r = pearsonR(xs, ys);
      const reg = linearRegression(xs, ys);
      const rSign = invertX && r !== null ? -r : r;  // dirección "esperada"
      const rColor = rSign === null ? '#94A3B8' : Math.abs(rSign) >= 0.5 ? '#1B2A4A' : Math.abs(rSign) >= 0.3 ? '#F97316' : '#94A3B8';
      const significant = rSign !== null && Math.abs(rSign) >= 0.75;

      const W = 320, H = 220, PAD_L = 40, PAD_R = 18, PAD_T = 14, PAD_B = 38;
      const innerW = W - PAD_L - PAD_R;
      const innerH = H - PAD_T - PAD_B;
      const yMin = 0, yMax = 60;
      const xLo = xMin, xHi = xMax;
      const xFor = (v) => PAD_L + ((v - xLo) / (xHi - xLo)) * innerW;
      const yFor = (v) => PAD_T + (1 - (v - yMin) / (yMax - yMin)) * innerH;

      // Trend line endpoints
      let trendPath = null;
      if (reg) {
        const x1 = xLo, x2 = xHi;
        const y1 = Math.max(yMin, Math.min(yMax, reg.intercept + reg.slope * x1));
        const y2 = Math.max(yMin, Math.min(yMax, reg.intercept + reg.slope * x2));
        trendPath = `M ${xFor(x1)} ${yFor(y1)} L ${xFor(x2)} ${yFor(y2)}`;
      }

      const xTicks = 4, yTicks = 4;

    function CorrelationsSection() {
      const [callStats, setCallStats] = React.useState(null);
      React.useEffect(() => {
        let cancelled = false;
        fetch('https://delicate-poetry-a88a.ines-25d.workers.dev/whatsapp-calls', { cache: 'no-store' })
          .then(r => r.json())
          .then(d => {
            if (cancelled || !Array.isArray(d)) return;
            const isBiz = (date) => {
              const day = date.getDay(), hour = date.getHours();
              if (day === 0) return false;
              if (day === 6) return hour >= 9 && hour < 15;
              return hour >= 9 && hour < 19;
            };
            const stats = {};
            d.forEach(c => {
              const inst = (c.instance || '').replace(/^Whats App /, '').replace(/^WhatsApp /, '').trim();
              const key = inst.split(' ')[0].toLowerCase();
              if (!key) return;
              if (!stats[key]) stats[key] = { totalBiz: 0, missedBiz: 0 };
              const dt = new Date(c.raw?.data?.date || c.ts);
              if (isBiz(dt)) {
                stats[key].totalBiz++;
                if (c.missed) stats[key].missedBiz++;
              }
            });
            setCallStats(stats);
          })
          .catch(() => setCallStats({}));
        return () => { cancelled = true; };
      }, []);

      // Build per-agent points: only agents with frustration data
      const data = agentRanking.map(a => {
        const fAll = [a.rate, a.mar30, a.may4, a.may4pm, a.may13, a.jun2].filter(v => v !== null && v !== undefined);
        const frust = fAll.length ? fAll[fAll.length - 1] : null;
        const resp = responseTimes.find(r => r.agent === a.name)?.median ?? null;
        const writingObj = writingQuality.find(w => w.agent === a.name);
        const writingScore = writingObj?.score ?? null;
        const writingGrade = writingScore !== null ? Math.max(0, Math.min(100, Math.round(100 - writingScore * 1.2))) : null;
        const resolution = resolutionData.find(r => r.agent === a.name)?.resolvedPct ?? null;
        const firstName = a.name.split(' ')[0].toLowerCase();
        const cs = callStats?.[firstName];
        const callsBiz = (cs && cs.totalBiz > 0) ? Math.round(cs.missedBiz / cs.totalBiz * 100) : null;
        return { name: a.name, frust, resp, writingGrade, writingScore, resolution, callsBiz };
      }).filter(d => d.frust !== null);

      const respPoints   = data.map(d => ({ name: d.name, x: d.resp, y: d.frust }));
      const writPoints   = data.map(d => ({ name: d.name, x: d.writingGrade, y: d.frust }));
      const resPoints    = data.map(d => ({ name: d.name, x: d.resolution, y: d.frust }));
      const callsPoints  = data.map(d => ({ name: d.name, x: d.callsBiz, y: d.frust }));

      // Compute headline insights from r values
      const rResp  = pearsonR(respPoints.filter(p => p.x !== null).map(p => p.x), respPoints.filter(p => p.x !== null).map(p => p.y));
      const rWrit  = pearsonR(writPoints.filter(p => p.x !== null).map(p => p.x), writPoints.filter(p => p.x !== null).map(p => p.y));
      const rRes   = pearsonR(resPoints.filter(p => p.x !== null).map(p => p.x), resPoints.filter(p => p.x !== null).map(p => p.y));
      const rCalls = pearsonR(callsPoints.filter(p => p.x !== null).map(p => p.x), callsPoints.filter(p => p.x !== null).map(p => p.y));

      const nResp = respPoints.filter(p => p.x !== null).length;
      const nWrit = writPoints.filter(p => p.x !== null).length;
      const nRes  = resPoints.filter(p => p.x !== null).length;
      const nCalls = callsPoints.filter(p => p.x !== null).length;

      const fmtR = (r) => r === null ? '—' : `${r >= 0 ? '+' : ''}${r.toFixed(2)}`;

      return (
        <Section title="Correlaciones con Frustración" id="correlations">
          {/* Caveat banner */}
          <div className="bg-orange-50 border border-orange-200 rounded-xl p-4 mb-6 text-xs text-orange-900 leading-relaxed">
            <p className="font-bold mb-1">⚠️ Lectura con cautela</p>
            <p>
              Solo tenemos {data.length} agentes con datos. Para que un coeficiente sea estadísticamente significativo
              al 5% con ese n, |r| tendría que ser mayor a <strong>0.75</strong>. Esta vista está pensada para detectar tendencias direccionales,
              no para concluir causalidad. Se enriquecerá con cada nueva corrida.
            </p>
          </div>

          {/* Correlation summary table */}
          <div className="bg-white rounded-xl shadow-sm overflow-hidden mb-6">
            <table className="w-full text-sm">
              <thead>
                <tr className="bg-navy-dark text-white">
                  <th className="py-3 px-4 text-left text-xs font-semibold">Variable</th>
                  <th className="py-3 px-4 text-center text-xs font-semibold">Coef. Pearson r</th>
                  <th className="py-3 px-4 text-center text-xs font-semibold">n</th>
                  <th className="py-3 px-4 text-left text-xs font-semibold">Lectura direccional</th>
                </tr>
              </thead>
              <tbody>
                <tr className="border-b border-gray-100">
                  <td className="py-3 px-4 font-semibold">Tiempo de respuesta (mediana)</td>
                  <td className="py-3 px-4 text-center font-mono font-bold">{fmtR(rResp)}</td>
                  <td className="py-3 px-4 text-center text-gray-500">{nResp}</td>
                  <td className="py-3 px-4 text-gray-600 text-xs">{rResp !== null && rResp > 0.2 ? 'Más lento → más frustración (esperado)' : rResp !== null && rResp < -0.2 ? 'Más lento → menos frustración (inesperado)' : 'Sin patrón claro'}</td>
                </tr>
                <tr className="border-b border-gray-100">
                  <td className="py-3 px-4 font-semibold">Calidad de escritura (/100)</td>
                  <td className="py-3 px-4 text-center font-mono font-bold">{fmtR(rWrit)}</td>
                  <td className="py-3 px-4 text-center text-gray-500">{nWrit}</td>
                  <td className="py-3 px-4 text-gray-600 text-xs">{rWrit !== null && rWrit < -0.2 ? 'Mejor escritura → menos frustración' : rWrit !== null && rWrit > 0.2 ? 'Mejor escritura → MÁS frustración (probable confounding por antigüedad)' : 'Sin patrón claro'}</td>
                </tr>
                <tr className="border-b border-gray-100">
                  <td className="py-3 px-4 font-semibold">% Resolución</td>
                  <td className="py-3 px-4 text-center font-mono font-bold">{fmtR(rRes)}</td>
                  <td className="py-3 px-4 text-center text-gray-500">{nRes}</td>
                  <td className="py-3 px-4 text-gray-600 text-xs">{rRes !== null && rRes < -0.2 ? 'Más resolución → menos frustración (esperado)' : rRes !== null && rRes > 0.2 ? 'Más resolución → más frustración (inesperado)' : 'Sin patrón claro'}</td>
                </tr>
                <tr>
                  <td className="py-3 px-4 font-semibold">% Llamadas perdidas (laboral)</td>
                  <td className="py-3 px-4 text-center font-mono font-bold">{fmtR(rCalls)}</td>
                  <td className="py-3 px-4 text-center text-gray-500">{nCalls}</td>
                  <td className="py-3 px-4 text-gray-600 text-xs">{nCalls < 3 ? 'Datos insuficientes (webhook live, se acumula)' : rCalls !== null && rCalls > 0.2 ? 'Más perdidas → más frustración (esperado)' : rCalls !== null && rCalls < -0.2 ? 'Más perdidas → menos frustración (inesperado)' : 'Sin patrón claro'}</td>
                </tr>
              </tbody>
            </table>
          </div>

          {/* Scatter plots grid */}
          <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
            <ScatterChart title="Frustración vs Tiempo de Respuesta" xLabel="Mediana de respuesta (min)" points={respPoints} xMin={0} xMax={35}/>
            <ScatterChart title="Frustración vs Calidad de Escritura" xLabel="Calificación de escritura (/100)" points={writPoints} xMin={0} xMax={100}/>
            <ScatterChart title="Frustración vs % Resolución" xLabel="% conversaciones resueltas" points={resPoints} xMin={0} xMax={100}/>
            <ScatterChart title="Frustración vs Llamadas Perdidas" xLabel="% perdidas en horario laboral" points={callsPoints} xMin={0} xMax={100}/>
          </div>

          {/* Methodology */}
          <div className="mt-8 bg-navy-dark rounded-xl p-5 text-xs text-gray-300 leading-relaxed">
            <p className="text-teal text-sm font-bold mb-2">Notas metodológicas</p>
            <ul className="space-y-1.5 list-disc list-inside">
              <li>Cada punto del scatter es un asesor. Eje Y = % frustración (última medición disponible). Eje X = la variable indicada.</li>
              <li>La línea punteada gris es la recta de regresión simple (mínimos cuadrados).</li>
              <li>El coeficiente r de Pearson va de −1 a +1. Cerca de 0 = sin relación; +1 = relación lineal positiva perfecta; −1 = perfectamente negativa.</li>
              <li><strong className="text-white">Limitación principal:</strong> son correlaciones agregadas por agente — no comparan conversación contra conversación. Para detectar causalidad real habría que cruzar mensajes con frustración a nivel de hilo individual.</li>
              <li>Conforme se acumulen más corridas, los coeficientes se estabilizan y se vuelven interpretables. Hoy son sugerencias direccionales.</li>
            </ul>
          </div>
        </Section>
      );
    }

    function ScheduleSection() {
      const [gran, setGran] = React.useState('week');     // day | week | month
      const [metric, setMetric] = React.useState('coverage'); // coverage | engaged
      const [mode, setMode] = React.useState('avg');       // avg (h/día) | total (acumulado)
      const A = activityData;

      const round1 = (x) => Math.round(x * 10) / 10;
      const mean = (a) => a.length ? a.reduce((s, x) => s + x, 0) / a.length : 0;
      const median = (a) => {
        if (!a.length) return 0;
        const s = [...a].sort((x, y) => x - y), n = s.length;
        return n % 2 ? s[(n - 1) / 2] : (s[n / 2 - 1] + s[n / 2]) / 2;
      };
      const toMin = (hhmm) => { const [h, m] = hhmm.split(':').map(Number); return h * 60 + m; };
      const fmtMin = (mins) => `${String(Math.floor(mins / 60)).padStart(2, '0')}:${String(Math.round(mins % 60)).padStart(2, '0')}`;
      const key = (m) => m === 'coverage' ? 'coverage' : 'engaged';

      // Flatten daily records
      const records = [];
      Object.entries(A.by_agent_day).forEach(([agent, days]) => {
        Object.entries(days).forEach(([date, d]) => records.push({ agent, date, ...d }));
      });

      // Per-agent summary over the whole window
      const agents = Object.keys(A.by_agent_day).map((agent) => {
        const ds = Object.values(A.by_agent_day[agent]);
        const cov = ds.map(d => d.coverage), eng = ds.map(d => d.engaged);
        const firsts = ds.map(d => toMin(d.first)), lasts = ds.map(d => toMin(d.last));
        return {
          agent, days: ds.length,
          meanCov: round1(mean(cov)), medCov: round1(median(cov)), totalCov: Math.round(cov.reduce((s, x) => s + x, 0)),
          meanEng: round1(mean(eng)), medEng: round1(median(eng)), totalEng: Math.round(eng.reduce((s, x) => s + x, 0)),
          startMed: fmtMin(median(firsts)), endMed: fmtMin(median(lasts)),

      }).sort((a, b) => metric === 'coverage' ? b.meanCov - a.meanCov : b.meanEng - a.meanEng);

      // Bucketing for the time-series chart
      const bucketKey = (date) => {
        if (gran === 'day') return date;
        if (gran === 'month') return date.slice(0, 7);
        const dt = new Date(date + 'T00:00:00');
        const dow = (dt.getDay() + 6) % 7; // Monday = 0

      };
      const bucketLabel = (k) => {

            <div className="bg-navy-card rounded-xl p-5">
              <div className="text-gray-400 text-xs uppercase tracking-wide mb-1">Acumulado del equipo</div>
              <div className="text-3xl font-extrabold text-orange-400">{teamTotal.toLocaleString('es-MX')}<span className="text-lg"> h</span></div>
              <div className="text-gray-500 text-xs mt-1">en la ventana de {A.window_days} días</div>
            </div>
            <div className="bg-navy-card rounded-xl p-5">
              <div className="text-gray-400 text-xs uppercase tracking-wide mb-1">Agentes monitoreados</div>
              <div className="text-3xl font-extrabold text-white">{agents.length}</div>
              <div className="text-gray-500 text-xs mt-1">{records.length.toLocaleString('es-MX')} días-agente</div>
            </div>
          </div>

          {/* Time-series bar chart */}
          <div className="bg-navy-card rounded-xl p-6 mb-8">
            <div className="flex items-baseline justify-between flex-wrap gap-2 mb-4">
              <h3 className="text-white text-lg font-bold">{mode === 'avg' ? 'Promedio de horas/día' : 'Horas acumuladas'} · {gran === 'day' ? 'por día' : gran === 'week' ? 'por semana' : 'por mes'}</h3>
              <span className="text-xs text-gray-400">{metricLabel}</span>
            </div>
            <svg viewBox={`0 0 ${W} ${H}`} className="w-full" style={{ minHeight: '180px' }}>
              {[0, 0.25, 0.5, 0.75, 1].map((f, i) => {
                const y = PADT + (1 - f) * (H - PADT - PADB);
                return (
                  <g key={i}>
                    <line x1={PADL} y1={y} x2={W} y2={y} stroke="#1e293b" strokeWidth="1" />
                    <text x={PADL - 6} y={y + 3} textAnchor="end" fill="#64748b" fontSize="9">{Math.round(chartMax * f)}</text>
                  </g>
                );
              })}
              {bucketList.map((b, i) => {
                const v = mode === 'avg' ? b.avg : b.total;
                const h = (v / chartMax) * (H - PADT - PADB);
                const x = PADL + 4 + i * bw;
                return (
                  <g key={b.key}>
                    <rect x={x} y={H - PADB - h} width={Math.max(1, bw - 2)} height={h} rx={Math.min(2, bw / 3)} fill="#2EC4B6" opacity="0.88">
                      <title>{b.label}: {mode === 'avg' ? b.avg + ' h/día' : b.total + ' h'}</title>
                    </rect>
                    {(i % labelEvery === 0) && (
                      <text x={x + bw / 2} y={H - PADB + 12} textAnchor="middle" fill="#64748b" fontSize="9">{b.label}</text>
                    )}
                  </g>
                );
              })}
            </svg>
            <p className="text-xs text-gray-500 mt-2">Cada barra = {mode === 'avg' ? 'promedio de horas/día por agente activo' : 'suma de horas-agente'} en ese {gran === 'day' ? 'día' : gran === 'week' ? 'semana' : 'mes'}. Pasa el cursor para ver el valor.</p>
          </div>

          {/* Per-agent table */}
          <div className="bg-white rounded-xl shadow-sm overflow-hidden">
            <div className="overflow-x-auto">
              <table className="w-full min-w-[760px]">
                <thead>
                  <tr className="bg-navy-dark text-white">
                    <th className="py-3 px-3 text-left text-xs font-semibold w-12">#</th>
                    <th className="py-3 px-3 text-left text-xs font-semibold">Agente CS</th>
                    <th className="py-3 px-3 text-center text-xs font-semibold">Días activos</th>
                    <th className="py-3 px-3 text-center text-xs font-semibold bg-teal/20">Media h/día</th>
                    <th className="py-3 px-3 text-center text-xs font-semibold">Mediana h/día</th>
                    <th className="py-3 px-3 text-center text-xs font-semibold">Acumulado h</th>
                    <th className="py-3 px-3 text-center text-xs font-semibold">Horario típico</th>
                  </tr>
                </thead>
                <tbody>
                  {agents.map((a, i) => {
                    const meanV = metric === 'coverage' ? a.meanCov : a.meanEng;
                    const medV = metric === 'coverage' ? a.medCov : a.medEng;
                    const totV = metric === 'coverage' ? a.totalCov : a.totalEng;
                    const barPct = Math.min(100, (meanV / 12) * 100);
                    return (
                      <tr key={a.agent} className={`border-b border-gray-100 ${i % 2 === 0 ? 'bg-white' : 'bg-gray-50'} hover:bg-gray-100 transition-colors`}>
                        <td className="py-3 px-3 text-sm text-gray-400 font-mono">{i + 1}</td>
                        <td className="py-3 px-3 text-sm font-medium text-navy-dark">{a.agent}</td>
                        <td className="py-3 px-3 text-center text-sm text-gray-600">{a.days}</td>
                        <td className="py-3 px-3 bg-teal/5">
                          <div className="flex items-center gap-2">
                            <div className="flex-1 h-2 bg-gray-100 rounded-full overflow-hidden">
                              <div className="h-full rounded-full" style={{ width: `${barPct}%`, background: '#2EC4B6' }}></div>
                            </div>
                            <span className="text-sm font-bold text-navy-dark w-10 text-right">{meanV}</span>
                          </div>
                        </td>
                        <td className="py-3 px-3 text-center text-sm text-gray-700">{medV}</td>
                        <td className="py-3 px-3 text-center text-sm font-semibold text-navy-dark">{totV.toLocaleString('es-MX')}</td>
                        <td className="py-3 px-3 text-center text-xs text-gray-500 font-mono">{a.startMed}–{a.endMed}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
            <div className="px-4 py-3 bg-gray-50 border-t">
              <p className="text-xs text-gray-400">
                Columnas reflejan la métrica seleccionada ({metric === 'coverage' ? 'Ventana de atención' : 'Horas activas'}). "Horario típico" = mediana de la 1ª y última hora de mensaje (hora CDMX). Ventana {A.start_date} → {A.end_date}.
              </p>
            </div>
          </div>
        </Section>
      );
    }

    const TABS = [
      { id: 'overview',    label: 'Resumen',          icon: '📊' },
      { id: 'agents',      label: 'Tasa de Frustración', icon: '😤' },
      { id: 'resolution',  label: 'Resolución',       icon: '🎯' },
      { id: 'response',    label: 'Tiempo de Respuesta', icon: '⏱️' },
      { id: 'schedule',    label: 'Horarios de Atención', icon: '🕐' },
      { id: 'writing',     label: 'Escritura',        icon: '✍️' },
      { id: 'calls',       label: 'Llamadas',         icon: '📞' },
      { id: 'feedback',    label: 'Feedback',         icon: '📋' },
      { id: 'correlations',label: 'Correlaciones',    icon: '🔗' },
      { id: 'insights',    label: 'Insights y Mejoras', icon: '🔍' },
      { id: 'coverage',    label: 'Cobertura',        icon: '📡' },
    ];

    function SideNav({ open, onClose, active, onChange }) {
      return (
        <>
          {/* backdrop */}
          <div onClick={onClose}
            className={`fixed inset-0 z-[55] bg-black/40 transition-opacity duration-300 ${open ? 'opacity-100' : 'opacity-0 pointer-events-none'}`}></div>
          {/* drawer */}
          <aside className={`fixed top-0 left-0 z-[60] h-full w-64 bg-navy-dark shadow-2xl transition-transform duration-300 ease-in-out ${open ? 'translate-x-0' : '-translate-x-full'}`}>
            <div className="flex items-center justify-between px-4 py-4 border-b border-white/10">
              <span className="text-sm font-semibold text-white tracking-tight">
                <span className="text-gray-400 font-normal">MoradaUno</span> · WhatsApp CS
              </span>
              <button onClick={onClose} aria-label="Cerrar menú" className="text-white/70 hover:text-white p-1 rounded hover:bg-white/10">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
              </button>
            </div>
            <nav className="p-3 flex flex-col gap-1 overflow-y-auto" style={{height: 'calc(100% - 57px)'}}>
              {TABS.map(t => {
                const isActive = active === t.id;
                return (
                  <button key={t.id} onClick={() => onChange(t.id)}
                    className={`flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-left transition-colors ${isActive ? 'bg-teal text-navy-dark font-semibold' : 'text-gray-300 hover:bg-white/10 hover:text-white'}`}>
                    <span className="w-5 text-center shrink-0">{t.icon}</span>
                    <span>{t.label}</span>
                  </button>
                );
              })}
            </nav>
          </aside>
        </>
      );
    }

    function App() {
      const [tab, setTab] = React.useState('overview');
      const [navOpen, setNavOpen] = React.useState(false);
      // Restore tab from URL hash on load
      React.useEffect(() => {
        const hash = window.location.hash.replace('#', '');
        if (hash && TABS.find(t => t.id === hash)) setTab(hash);
        const handler = () => {
          const h = window.location.hash.replace('#', '');
          if (h && TABS.find(t => t.id === h)) setTab(h);
        };
        window.addEventListener('hashchange', handler);
        return () => window.removeEventListener('hashchange', handler);
      }, []);
      const setTabAndHash = (id) => {
        setTab(id);
        window.location.hash = id;
        window.scrollTo({ top: 0, behavior: 'smooth' });
        setNavOpen(false);
      };
      const activeLabel = (TABS.find(t => t.id === tab) || {}).label;
      return (
        <div className="app-bg">
          <Header onToggleNav={() => setNavOpen(o => !o)} activeLabel={activeLabel} />
          <SideNav open={navOpen} onClose={() => setNavOpen(false)} active={tab} onChange={setTabAndHash} />
          {tab === 'overview' && (
            <>
              <Hero />
              <KeyMetricsSummary onJump={setTabAndHash} />
              <StatsCards />
            </>
          )}
          {tab === 'agents' && <ComparisonSection />}
          {tab === 'resolution' && <ResolutionSection />}
          {tab === 'response' && <ResponseTimeSection />}
          {tab === 'schedule' && <ScheduleSection />}
          {tab === 'writing' && <WritingQualitySection />}
          {tab === 'calls' && <CallsSection />}
          {tab === 'feedback' && <FeedbackSection />}
          {tab === 'correlations' && <CorrelationsSection />}
          {tab === 'insights' && (
            <>
              <EvolutionOfProblemsSection />
              <TopRequestsChart />
              <FrustrationOverview />
              <ImprovementAreasSection />
            </>
          )}
          {tab === 'coverage' && <DataCoverageSection />}
          <Footer />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
