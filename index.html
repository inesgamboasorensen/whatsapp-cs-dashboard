    function ReminderCard() {
      const lastRun = new Date(runsMeta.lastRunDate);
      const today = new Date();
      const daysSince = Math.floor((today - lastRun) / (1000 * 60 * 60 * 24));
      const daysUntilNext = Math.max(0, 30 - daysSince);
      const overdue = daysUntilNext === 0;
      const soon = daysUntilNext <= 7 && !overdue;
      const color = overdue ? '#E8505B' : soon ? '#F97316' : '#2EC4B6';
      const bg = overdue ? 'from-coral/10 to-coral/5' : soon ? 'from-orange-100/60 to-orange-50/30' : 'from-teal/10 to-teal/5';
      const icon = overdue ? '🚨' : soon ? '⏰' : '📅';
      const message = overdue
        ? `Han pasado ${daysSince} días desde el último análisis. Hora de correr una nueva medición.`
        : soon
        ? `En ${daysUntilNext} días toca correr el próximo análisis.`
        : `Próximo análisis recomendado en ${daysUntilNext} días.`;
      return (
        <div className={`relative overflow-hidden rounded-2xl bg-gradient-to-br ${bg} border p-5 mb-6`} style={{borderColor: color + '40'}}>
          <div className="flex items-start justify-between gap-4 flex-wrap">
            <div className="flex items-start gap-3">
              <div className="text-2xl">{icon}</div>
              <div>
                <p className="text-xs font-bold uppercase tracking-wider" style={{color}}>Recordatorio mensual</p>
                <p className="text-sm font-semibold text-navy-dark mt-0.5">{message}</p>
                <p className="text-xs text-gray-500 mt-1">Última corrida: {new Date(runsMeta.lastRunDate).toLocaleDateString('es-MX', { day: 'numeric', month: 'long', year: 'numeric' })} · Hace {daysSince} {daysSince === 1 ? 'día' : 'días'}</p>
              </div>
            </div>
            {(overdue || soon) && (
              <a href="#how-to-run" onClick={(e) => { e.preventDefault(); document.getElementById('how-to-run')?.scrollIntoView({behavior: 'smooth'}); }}
                className="text-xs font-semibold px-3 py-2 rounded-full hover:opacity-90 transition-opacity shrink-0" style={{backgroundColor: color, color: 'white'}}>

        </div>
      );

                  const start = valid[0];

                      </div>
                    </div>
                  );
                })}

    function DonutChart({ data, size = 200, thickness = 28 }) {
      const radius = (size - thickness) / 2;
      const circumference = 2 * Math.PI * radius;
      const center = size / 2;
      let cumOffset = 0;

      return (
        <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
          {data.map((d, i) => {
            const dashLen = (d.pct / 100) * circumference;
            const offset = cumOffset;
            cumOffset += dashLen;
            return (
              <circle
                key={i} cx={center} cy={center} r={radius}
                fill="none" stroke={d.color} strokeWidth={thickness}
                strokeDasharray={`${dashLen} ${circumference - dashLen}`}
                strokeDashoffset={-offset}
                transform={`rotate(-90 ${center} ${center})`}
                className="donut-segment"
                style={{'--circumference': circumference, animationDelay: `${i * 0.15}s`}}
              />
            );
          })}
          <text x={center} y={center - 8} textAnchor="middle" fontSize="36" fontWeight="800" fill="#E8505B" dominantBaseline="middle">41%</text>
          <text x={center} y={center + 20} textAnchor="middle" fontSize="12" fill="#94A3B8">frustración</text>
        </svg>
      );
    }

    // Calls section — fetches live from Cloudflare Worker, auto-refreshes every 30s
    function CallsSection() {
      const [calls, setCalls] = React.useState(null);
      const [error, setError] = React.useState(null);
      const [lastUpdated, setLastUpdated] = React.useState(null);
      const [refreshing, setRefreshing] = React.useState(false);
      const [windowMode, setWindowMode] = React.useState('daily'); // 'daily' | 'weekly' | 'monthly'

      const fetchCalls = React.useCallback(() => {
        setRefreshing(true);
        fetch('https://delicate-poetry-a88a.ines-25d.workers.dev/whatsapp-calls', { cache: 'no-store' })
          .then(r => r.json())
          .then(d => {
            setCalls(d);
            setLastUpdated(new Date());
            setError(null);
          })
          .catch(e => setError(e.message))
          .finally(() => setRefreshing(false));
      }, []);

      React.useEffect(() => {
        fetchCalls();
        const interval = setInterval(fetchCalls, 30000); // 30s auto-refresh
        return () => clearInterval(interval);
      }, [fetchCalls]);

      if (error) {
        return (
          <Section title="Llamadas WhatsApp" id="calls">
            <div className="bg-white rounded-xl p-8 text-center">
              <p className="text-gray-500 text-sm">No se pudieron cargar las llamadas: {error}</p>
            </div>
          </Section>
        );
      }
      if (calls === null) {
        return (
          <Section title="Llamadas WhatsApp" id="calls">
            <div className="bg-white rounded-xl p-8 text-center">
              <p className="text-gray-500 text-sm">Cargando datos de llamadas...</p>
            </div>
          </Section>
        );
      }

      // Compute metrics
      const cleanInstance = (n) => (n || '').replace(/^Whats App /, '').replace(/^WhatsApp /, '');

      // Hora REAL de la llamada (no la del webhook). El webhook puede tardar
      // horas o días en re-emitir el evento si la cuenta estaba "offline".
      const callDate = (c) => new Date(c.raw?.data?.date || c.ts);

      // Horario laboral MoradaUno (hora CDMX): L-V 9-19, Sáb 9-15, Dom cerrado.
      // El navegador debe estar en TZ America/Mexico_City para que coincida.
      const isBusinessHours = (date) => {
        const day = date.getDay();
        const hour = date.getHours();
        if (day === 0) return false;
        if (day === 6) return hour >= 9 && hour < 15;
        return hour >= 9 && hour < 19;
      };

      // Decorate every call with parsed date + clean agent once
      const allCalls = calls.map(c => ({ ...c, _dt: callDate(c), _agent: cleanInstance(c.instance) }));

      const now = new Date();
      const cutoff30d = new Date(now.getTime() - 30 * 24 * 60 * 60 * 1000);
      const calls30d = allCalls.filter(c => c._dt >= cutoff30d);

      // ── KPIs últimos 30 días ─────────────────────────────────────────
      const total30d = calls30d.length;
      const missed30d = calls30d.filter(c => c.missed).length;
      const missedRate30d = total30d ? (missed30d / total30d * 100).toFixed(1) : '0';
      const bizHours30d = calls30d.filter(c => isBusinessHours(c._dt)).length;
      const bizHoursRate30d = total30d ? (bizHours30d / total30d * 100).toFixed(0) : '0';

      // ── Ventana del toggle (daily/weekly/monthly) ────────────────────
      // daily   → últimos 30 días, 1 barra por día
      // weekly  → últimas 12 semanas (lunes-domingo CDMX), 1 barra por semana
      // monthly → últimos 6 meses, 1 barra por mes
      const startOfDay = (d) => { const x = new Date(d); x.setHours(0,0,0,0); return x; };
      const startOfWeek = (d) => {
        const x = startOfDay(d);
        const day = x.getDay(); // 0=Sun
        const diff = (day === 0 ? -6 : 1 - day); // back to Monday
        x.setDate(x.getDate() + diff);
        return x;
      };
      const startOfMonth = (d) => { const x = new Date(d); x.setDate(1); x.setHours(0,0,0,0); return x; };
      const addDays = (d, n) => { const x = new Date(d); x.setDate(x.getDate() + n); return x; };
      const addMonths = (d, n) => { const x = new Date(d); x.setMonth(x.getMonth() + n); return x; };

      let windowStart, buckets;
      if (windowMode === 'daily') {
        windowStart = addDays(startOfDay(now), -29);
        buckets = Array.from({length: 30}, (_, i) => {
          const s = addDays(windowStart, i);
          const e = addDays(s, 1);
          return { start: s, end: e, label: s.toLocaleDateString('es-MX', { day: '2-digit', month: 'short', timeZone: 'America/Mexico_City' }) };
        });
      } else if (windowMode === 'weekly') {
        windowStart = addDays(startOfWeek(now), -7 * 11);
        buckets = Array.from({length: 12}, (_, i) => {
          const s = addDays(windowStart, i * 7);
          const e = addDays(s, 7);
          return { start: s, end: e, label: s.toLocaleDateString('es-MX', { day: '2-digit', month: 'short', timeZone: 'America/Mexico_City' }) };
        });
      } else {
        windowStart = addMonths(startOfMonth(now), -5);
        buckets = Array.from({length: 6}, (_, i) => {
          const s = addMonths(windowStart, i);
          const e = addMonths(s, 1);
          return { start: s, end: e, label: s.toLocaleDateString('es-MX', { month: 'short', year: '2-digit', timeZone: 'America/Mexico_City' }) };
        });
      }
      const callsWindow = allCalls.filter(c => c._dt >= windowStart && c._dt < buckets[buckets.length - 1].end);

      // Series de tiempo: cada bucket con totales + perdidas
      buckets.forEach(b => { b.total = 0; b.missed = 0; });
      callsWindow.forEach(c => {
        for (const b of buckets) {
          if (c._dt >= b.start && c._dt < b.end) {
            b.total++;
            if (c.missed) b.missed++;
            break;
          }
        }
      });

      // Por agente en la ventana seleccionada
      const byAgentWin = {};
      callsWindow.forEach(c => {
        const a = c._agent;
        if (!byAgentWin[a]) byAgentWin[a] = { total: 0, missed: 0 };
        byAgentWin[a].total++;
        if (c.missed) byAgentWin[a].missed++;
      });
      const agentRows = Object.entries(byAgentWin)
        .map(([agent, s]) => ({
          agent,
          total: s.total,
          missed: s.missed,
          answered: s.total - s.missed,
          missedRate: s.total ? (s.missed / s.total * 100) : 0,
        }))
        .sort((a, b) => b.total - a.total);
      const maxAgentTotal = Math.max(1, ...agentRows.map(a => a.total));

      // ── Datos que siguen usando TODAS las llamadas (no afectados por toggle) ─
      const byHour = Array.from({length: 24}, () => ({total: 0, missed: 0}));
      const byClient = {};
      allCalls.forEach(c => {
        const hour = c._dt.getHours();
        if (hour >= 0 && hour < 24) {
          byHour[hour].total++;
          if (c.missed) byHour[hour].missed++;
        }
        if (c.remote) {
          if (!byClient[c.remote]) byClient[c.remote] = { total: 0, missed: 0, agents: new Set(), lastCall: c._dt };
          byClient[c.remote].total++;
          if (c.missed) byClient[c.remote].missed++;
          byClient[c.remote].agents.add(c._agent);
          if (c._dt > byClient[c.remote].lastCall) byClient[c.remote].lastCall = c._dt;
        }
      });

      const totalCalls = allCalls.length;

      const recentCalls = [...allCalls]
        .sort((a, b) => b._dt - a._dt)
        .slice(0, 20);

      const fmtMxTime = (d) => d.toLocaleString('es-MX', {
        weekday: 'short', day: '2-digit', month: 'short',
        hour: '2-digit', minute: '2-digit', hour12: false,
        timeZone: 'America/Mexico_City',
      });

      const repeatCallers = Object.entries(byClient)
        .filter(([_, v]) => v.total >= 3)

    // ── Per-agent structured feedback (auto-generated from metrics) ─────────
    // Returns an object with: grade, strengths[], improvements[], actions[], trend
    // callStats: optional { [firstName]: { totalBiz, missedBiz, missedBizRate } }
    function generateFeedback(agentName, callStats) {
      // Find the agent's data across all sources
      const ranking = agentRanking.find(a => a.name === agentName);
      const responseT = responseTimes.find(r => r.agent === agentName || r.agent === agentName.replace(/^Whats App /, ''));
      const writing = writingQuality.find(w => w.agent === agentName);
      const resolution = resolutionData.find(r => r.agent === agentName);
      const firstName = agentName.split(' ')[0].toLowerCase();
      const callRow = callStats ? (callStats[firstName] || null) : null;

      const strengths = [];
      const improvements = [];
      const actions = [];
      let trend = 'sin-datos';
      let trendNote = '';

      // === Frustration analysis ===
      const fAll = [ranking?.rate, ranking?.mar30, ranking?.may4, ranking?.may4pm, ranking?.may13, ranking?.jun2].filter(v => v !== null && v !== undefined);
      const latest = fAll[fAll.length - 1];
      const earliest = fAll[0];
      const frustHistory = fAll;

      if (latest !== undefined) {
        if (latest <= 15) strengths.push(`Tasa de frustración muy baja (${latest}%) — top tier del equipo`);
        else if (latest <= 25) strengths.push(`Tasa de frustración aceptable (${latest}%)`);
        else if (latest <= 40) improvements.push(`Tasa de frustración elevada (${latest}%) — revisar interacciones difíciles`);
        else improvements.push(`Tasa de frustración crítica (${latest}%) — atención inmediata`);

        if (fAll.length >= 2) {
          const delta = latest - earliest;
          if (delta <= -10) {
            trend = 'mejorando';
            trendNote = `Mejoró ${Math.abs(delta)} pts vs primera medición (${earliest}% → ${latest}%)`;
            strengths.push(`Tendencia positiva: ${trendNote}`);
          } else if (delta >= 10) {
            trend = 'empeorando';
            trendNote = `Subió ${delta} pts vs primera medición (${earliest}% → ${latest}%)`;
            improvements.push(`Tendencia negativa: ${trendNote}`);
          } else {
            trend = 'estable';
            trendNote = `Estable en ${latest}% (rango ${Math.min(...fAll)}-${Math.max(...fAll)}%)`;
          }
        } else {
          trend = 'inicial';
          trendNote = `Primera medición disponible: ${latest}%`;
        }
      }

      // === Response time analysis ===
      if (responseT) {
        if (responseT.median < 5) {
          strengths.push(`Mediana de respuesta excelente (${responseT.median.toFixed(1)} min)`);
        } else if (responseT.median < 15) {
          strengths.push(`Mediana de respuesta buena (${responseT.median.toFixed(1)} min)`);
        } else if (responseT.median < 30) {
          improvements.push(`Mediana de respuesta lenta (${responseT.median.toFixed(1)} min)`);
          actions.push('Apuntar a responder en menos de 15 min en horario laboral');
        } else {
          improvements.push(`Mediana de respuesta crítica (${responseT.median.toFixed(1)} min)`);
          actions.push('Revisar carga de trabajo o escalación — la mediana debería estar bajo 15 min');
        }

        if (responseT.under5 >= 60) strengths.push(`${responseT.under5}% de respuestas en menos de 5 min`);
        if (responseT.under30 < 70) improvements.push(`Solo ${responseT.under30}% responde en menos de 30 min`);
        if (responseT.avg > responseT.median * 5) {
          improvements.push(`Algunos brokers esperan mucho — promedio (${responseT.avg < 60 ? responseT.avg.toFixed(0) + ' min' : (responseT.avg/60).toFixed(1) + ' h'}) muy alto vs mediana`);
          actions.push('Identificar conversaciones que se quedan sin respuesta más de 1 hora');
        }
      }

      // === Writing quality analysis ===
      if (writing) {
        if (writing.score < 10) {
          strengths.push(`Escritura impecable (score ${writing.score}, ${writing.typos} typos por 100 msg)`);
        } else if (writing.score < 25) {
          // neutral
        } else {
          improvements.push(`Calidad de escritura a mejorar (score ${writing.score})`);
        }

        if (writing.typos > 2) {
          improvements.push(`${writing.typos} typos por cada 100 mensajes`);
          actions.push('Activar autocorrector de WhatsApp y revisar antes de enviar');
        }
        if (writing.lowerStart > 25) {
          improvements.push(`${writing.lowerStart}% de mensajes inician con minúscula`);
          actions.push('Iniciar siempre con mayúscula — proyecta más profesionalismo');
        }
        if (writing.missingAccents > 8) {
          improvements.push(`${writing.missingAccents}% de palabras sin acento`);
          actions.push('Habilitar teclado en español con acentos automáticos');
        }
        if (writing.emojiPerMsg > 0.5) {
          improvements.push(`Uso excesivo de emojis (${writing.emojiPerMsg}/mensaje)`);
        }
        if (writing.examples?.bad?.length > 0) {
          writing.examples.bad.forEach(b => improvements.push(b));
        }
      }

      // === Resolution effectiveness ===
      if (resolution) {
        if (resolution.resolvedPct >= 65) {
          strengths.push(`Alta tasa de resolución (${resolution.resolvedPct}% de conversaciones cerradas exitosamente)`);
        } else if (resolution.resolvedPct >= 50) {
          // neutral
        } else {
          improvements.push(`Tasa de resolución baja (${resolution.resolvedPct}%) — muchas conversaciones quedan sin cierre claro`);
          actions.push('Cerrar conversaciones con confirmación explícita ("¿queda algo más?", "te confirmo cuando quede listo")');
        }
        if (resolution.unresolvedPct >= 5) {
          improvements.push(`${resolution.unresolvedPct}% conversaciones terminan con el broker frustrado o sin solución`);
        }
        if (resolution.escalationPct > 50) {
          improvements.push(`${resolution.escalationPct}% de conversaciones requieren escalar a otro equipo — muchos cuellos de botella internos`);
          actions.push('Documentar qué casos se pueden resolver internamente para no escalar tanto');
        }
      }

      // === Calls (live webhook) — % perdidas en horario laboral ===
      if (callRow && callRow.totalBiz > 0) {
        const rate = Math.round(callRow.missedBiz / callRow.totalBiz * 100);
        if (rate <= 10) {
          strengths.push(`Disponibilidad telefónica alta (${rate}% perdidas en horario laboral · ${callRow.missedBiz}/${callRow.totalBiz})`);
        } else if (rate <= 25) {
          // neutral
        } else if (rate <= 50) {
          improvements.push(`${rate}% de llamadas perdidas en horario laboral (${callRow.missedBiz}/${callRow.totalBiz})`);
          actions.push('Revisar disponibilidad o redirigir llamadas cuando esté ocupado');
        } else {
          improvements.push(`Tasa crítica de llamadas perdidas en horario laboral: ${rate}% (${callRow.missedBiz}/${callRow.totalBiz})`);
          actions.push('Más de la mitad de las llamadas no se contestan en horario laboral — atención inmediata');
        }
      }

      // === Coverage / data freshness ===
      const today = new Date().toISOString().slice(0, 10);
      if (ranking?.lastSeen) {
        const daysSince = Math.floor((new Date(today) - new Date(ranking.lastSeen)) / (1000 * 60 * 60 * 24));
        if (daysSince > 14) {
          improvements.push(`Sin datos recientes desde ${ranking.lastSeen} (${daysSince} días)`);
          actions.push('Reconectar la cuenta de WhatsApp en Evolution API');
        }
      }

      return {
        strengths, improvements, actions,
        trend, trendNote,
        frustHistory,
        hasResponseData: !!responseT,
        hasWritingData: !!writing,
        responseT, writing, ranking, callRow,
      };
    }

    // Helper: read a metric for an agent and return { value, displayValue, color, label, ok }
    // callStats: optional { [firstName]: { totalBiz, missedBiz, missedBizRate } } from FeedbackSection
    function getMetrics(agentName, callStats) {
      const ranking = agentRanking.find(a => a.name === agentName);
      const responseT = responseTimes.find(r => r.agent === agentName || r.agent === agentName.replace(/^Whats App /, ''));
      const writing = writingQuality.find(w => w.agent === agentName);
      const resolution = resolutionData.find(r => r.agent === agentName);

      // Frustration: latest available
      const fAll = ranking ? [ranking.rate, ranking.mar30, ranking.may4, ranking.may4pm, ranking.may13, ranking.jun2].filter(v => v !== null && v !== undefined) : [];
      const frustration = fAll.length ? fAll[fAll.length - 1] : null;

      // Calls: aggregate from live data, matching agent first name to instance
      const firstName = agentName.split(' ')[0].toLowerCase();
      const callRow = callStats ? (callStats[firstName] || null) : null;
      const callsBizMissedRate = (callRow && callRow.totalBiz > 0) ? Math.round(callRow.missedBiz / callRow.totalBiz * 100) : null;

      const colorByFrust = (v) => v === null ? '#94A3B8' : v <= 15 ? '#2EC4B6' : v <= 30 ? '#22C55E' : v <= 45 ? '#F97316' : '#E8505B';
      const colorByResp  = (v) => v === null ? '#94A3B8' : v < 5 ? '#2EC4B6' : v < 15 ? '#22C55E' : v < 30 ? '#F97316' : '#E8505B';
      const colorByGrade = (g) => g === null ? '#94A3B8' : g >= 85 ? '#2EC4B6' : g >= 70 ? '#22C55E' : g >= 55 ? '#F97316' : '#E8505B';
      const colorByRes   = (v) => v === null ? '#94A3B8' : v >= 65 ? '#2EC4B6' : v >= 50 ? '#22C55E' : v >= 35 ? '#F97316' : '#E8505B';
      const colorByMiss  = (v) => v === null ? '#94A3B8' : v <= 10 ? '#2EC4B6' : v <= 25 ? '#22C55E' : v <= 50 ? '#F97316' : '#E8505B';

      const writingGrade = writing ? Math.max(0, Math.min(100, Math.round(100 - writing.score * 1.2))) : null;

      return {
        ranking, responseT, writing, resolution, callRow,
        frustration: { value: frustration, color: colorByFrust(frustration), display: frustration !== null ? `${frustration}%` : '—' },
        responseTime: { value: responseT?.median ?? null, color: colorByResp(responseT?.median ?? null),
          display: responseT ? (responseT.median < 60 ? `${responseT.median.toFixed(1)} min` : `${(responseT.median/60).toFixed(1)} h`) : '—' },
        writingGrade: { value: writingGrade, color: colorByGrade(writingGrade), display: writingGrade !== null ? `${writingGrade}/100` : '—' },
        resolutionPct: { value: resolution?.resolvedPct ?? null, color: colorByRes(resolution?.resolvedPct ?? null),
          display: resolution ? `${resolution.resolvedPct}%` : '—' },
        callsBizMissed: {
          value: callsBizMissedRate,
          color: colorByMiss(callsBizMissedRate),
          display: callsBizMissedRate !== null ? `${callsBizMissedRate}%` : '—',
          sub: callRow ? `${callRow.missedBiz}/${callRow.totalBiz} en horario` : 'sin datos',
        },
      };
    }

    // Convierte cada métrica disponible a un score 0-100 y promedia para sacar la calificación
    function gradeFromMetrics(m) {
      const scores = [];
      if (m.frustration.value !== null) scores.push({ key: 'frustración', s: Math.max(0, Math.min(100, 100 - m.frustration.value * 2)) });
      if (m.resolutionPct.value !== null) scores.push({ key: 'resolución', s: m.resolutionPct.value });

      if (m.callsBizMissed.value !== null) scores.push({ key: 'llamadas', s: 100 - m.callsBizMissed.value });

      if (scores.length === 0) return { grade: '—', gradeColor: '#94A3B8', gradeLabel: 'Sin datos suficientes', score: null, scores };
      const avg = Math.round(scores.reduce((s, x) => s + x.s, 0) / scores.length);

      if (avg >= 85)      { grade = 'A'; gradeColor = '#2EC4B6'; gradeLabel = 'Excelente desempeño'; }

    // ── Correlaciones: frustración vs cada métrica ─────────────────────────
    // Pearson r y scatter por agente. Pensado para crecer con más data.
    function pearsonR(xs, ys) {
      const n = xs.length;
      if (n < 2) return null;
      const mx = xs.reduce((s, x) => s + x, 0) / n;
      const my = ys.reduce((s, y) => s + y, 0) / n;
      let cov = 0, sx = 0, sy = 0;
      for (let i = 0; i < n; i++) {
        const dx = xs[i] - mx, dy = ys[i] - my;
        cov += dx * dy; sx += dx * dx; sy += dy * dy;
      }
      const denom = Math.sqrt(sx * sy);
      return denom > 0 ? cov / denom : null;
    }

    function linearRegression(xs, ys) {
      const n = xs.length;
      if (n < 2) return null;
      const mx = xs.reduce((s, x) => s + x, 0) / n;
      const my = ys.reduce((s, y) => s + y, 0) / n;
      let num = 0, den = 0;
      for (let i = 0; i < n; i++) { num += (xs[i] - mx) * (ys[i] - my); den += (xs[i] - mx) ** 2; }
      if (den === 0) return null;
      const slope = num / den;
      const intercept = my - slope * mx;
      return { slope, intercept };
    }

    function ScatterChart({ title, xLabel, points, xMin, xMax, invertX }) {
      // points: [{ name, x, y }]
      const valid = points.filter(p => p.x !== null && p.x !== undefined && p.y !== null && p.y !== undefined);
      const xs = valid.map(p => p.x);
      const ys = valid.map(p => p.y);
      const r = pearsonR(xs, ys);
      const reg = linearRegression(xs, ys);
      const rSign = invertX && r !== null ? -r : r;  // dirección "esperada"
      const rColor = rSign === null ? '#94A3B8' : Math.abs(rSign) >= 0.5 ? '#1B2A4A' : Math.abs(rSign) >= 0.3 ? '#F97316' : '#94A3B8';
      const significant = rSign !== null && Math.abs(rSign) >= 0.75;

      const W = 320, H = 220, PAD_L = 40, PAD_R = 18, PAD_T = 14, PAD_B = 38;
      const innerW = W - PAD_L - PAD_R;
      const innerH = H - PAD_T - PAD_B;
      const yMin = 0, yMax = 60;
      const xLo = xMin, xHi = xMax;
      const xFor = (v) => PAD_L + ((v - xLo) / (xHi - xLo)) * innerW;
      const yFor = (v) => PAD_T + (1 - (v - yMin) / (yMax - yMin)) * innerH;

      // Trend line endpoints
      let trendPath = null;
      if (reg) {
        const x1 = xLo, x2 = xHi;
        const y1 = Math.max(yMin, Math.min(yMax, reg.intercept + reg.slope * x1));
        const y2 = Math.max(yMin, Math.min(yMax, reg.intercept + reg.slope * x2));
        trendPath = `M ${xFor(x1)} ${yFor(y1)} L ${xFor(x2)} ${yFor(y2)}`;
      }

      const xTicks = 4, yTicks = 4;
      return (
        <div className="bg-white rounded-xl p-4 shadow-sm">
          <div className="flex items-baseline justify-between mb-1">
            <h3 className="font-bold text-sm text-navy-dark">{title}</h3>
            <div className="text-right">
              <div className="text-lg font-extrabold leading-none" style={{color: rColor}}>{r === null ? '—' : `r = ${r >= 0 ? '+' : ''}${r.toFixed(2)}`}</div>
              <div className="text-[10px] text-gray-400">n = {valid.length}{significant ? ' · sig.' : ''}</div>
            </div>
          </div>
          <p className="text-[11px] text-gray-500 mb-2">Cada punto es un asesor</p>
          <svg viewBox={`0 0 ${W} ${H}`} className="w-full" style={{height: 'auto'}}>
            {/* Grid lines + Y axis */}
            {Array.from({length: yTicks + 1}, (_, i) => {
              const v = yMin + (i * (yMax - yMin)) / yTicks;
              const y = yFor(v);
              return (
                <g key={'y'+i}>
                  <line x1={PAD_L} y1={y} x2={W - PAD_R} y2={y} stroke="#E5E7EB" strokeWidth="0.5"/>
                  <text x={PAD_L - 6} y={y + 3} textAnchor="end" fontSize="9" fill="#94A3B8">{Math.round(v)}%</text>
                </g>
              );
            })}
            {/* X axis ticks */}
            {Array.from({length: xTicks + 1}, (_, i) => {
              const v = xLo + (i * (xHi - xLo)) / xTicks;
              const x = xFor(v);
              return (
                <g key={'x'+i}>
                  <line x1={x} y1={H - PAD_B} x2={x} y2={H - PAD_B + 4} stroke="#94A3B8" strokeWidth="0.6"/>
                  <text x={x} y={H - PAD_B + 14} textAnchor="middle" fontSize="9" fill="#94A3B8">
                    {(xHi - xLo) <= 5 ? v.toFixed(1) : Math.round(v)}
                  </text>
                </g>
              );
            })}
            {/* Axis labels */}
            <text x={PAD_L + innerW/2} y={H - 4} textAnchor="middle" fontSize="10" fill="#6B7280" fontWeight="600">{xLabel}</text>
            <text transform={`rotate(-90, 12, ${PAD_T + innerH/2})`} x={12} y={PAD_T + innerH/2} textAnchor="middle" fontSize="10" fill="#6B7280" fontWeight="600">Frustración %</text>
            {/* Trend line */}
            {trendPath && <path d={trendPath} stroke="#94A3B8" strokeWidth="1.5" strokeDasharray="4,3" fill="none"/>}
            {/* Points */}
            {valid.map((p, i) => (
              <g key={i}>
                <circle cx={xFor(p.x)} cy={yFor(p.y)} r="5" fill="#E8505B" stroke="#fff" strokeWidth="1.5"/>
                <text x={xFor(p.x) + 7} y={yFor(p.y) + 3} fontSize="9" fill="#374151" fontWeight="600">{p.name.split(' ')[0]}</text>
              </g>
            ))}
          </svg>
        </div>
      );
    }

                  <td className="py-3 px-4 text-center font-mono font-bold">{fmtR(rWrit)}</td>
                  <td className="py-3 px-4 text-center text-gray-500">{nWrit}</td>
                  <td className="py-3 px-4 text-gray-600 text-xs">{rWrit !== null && rWrit < -0.2 ? 'Mejor escritura → menos frustración' : rWrit !== null && rWrit > 0.2 ? 'Mejor escritura → MÁS frustración (probable confounding por antigüedad)' : 'Sin patrón claro'}</td>
                </tr>
                <tr className="border-b border-gray-100">
                  <td className="py-3 px-4 font-semibold">% Resolución</td>
                  <td className="py-3 px-4 text-center font-mono font-bold">{fmtR(rRes)}</td>
                  <td className="py-3 px-4 text-center text-gray-500">{nRes}</td>
                  <td className="py-3 px-4 text-gray-600 text-xs">{rRes !== null && rRes < -0.2 ? 'Más resolución → menos frustración (esperado)' : rRes !== null && rRes > 0.2 ? 'Más resolución → más frustración (inesperado)' : 'Sin patrón claro'}</td>
                </tr>
                <tr>
                  <td className="py-3 px-4 font-semibold">% Llamadas perdidas (laboral)</td>
                  <td className="py-3 px-4 text-center font-mono font-bold">{fmtR(rCalls)}</td>
                  <td className="py-3 px-4 text-center text-gray-500">{nCalls}</td>
                  <td className="py-3 px-4 text-gray-600 text-xs">{nCalls < 3 ? 'Datos insuficientes (webhook live, se acumula)' : rCalls !== null && rCalls > 0.2 ? 'Más perdidas → más frustración (esperado)' : rCalls !== null && rCalls < -0.2 ? 'Más perdidas → menos frustración (inesperado)' : 'Sin patrón claro'}</td>
                </tr>
              </tbody>
            </table>
          </div>

          {/* Scatter plots grid */}
          <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
            <ScatterChart title="Frustración vs Tiempo de Respuesta" xLabel="Mediana de respuesta (min)" points={respPoints} xMin={0} xMax={35}/>
            <ScatterChart title="Frustración vs Calidad de Escritura" xLabel="Calificación de escritura (/100)" points={writPoints} xMin={0} xMax={100}/>
            <ScatterChart title="Frustración vs % Resolución" xLabel="% conversaciones resueltas" points={resPoints} xMin={0} xMax={100}/>
            <ScatterChart title="Frustración vs Llamadas Perdidas" xLabel="% perdidas en horario laboral" points={callsPoints} xMin={0} xMax={100}/>
          </div>

          {/* Methodology */}
          <div className="mt-8 bg-navy-dark rounded-xl p-5 text-xs text-gray-300 leading-relaxed">
            <p className="text-teal text-sm font-bold mb-2">Notas metodológicas</p>
            <ul className="space-y-1.5 list-disc list-inside">
              <li>Cada punto del scatter es un asesor. Eje Y = % frustración (última medición disponible). Eje X = la variable indicada.</li>
              <li>La línea punteada gris es la recta de regresión simple (mínimos cuadrados).</li>
              <li>El coeficiente r de Pearson va de −1 a +1. Cerca de 0 = sin relación; +1 = relación lineal positiva perfecta; −1 = perfectamente negativa.</li>
              <li><strong className="text-white">Limitación principal:</strong> son correlaciones agregadas por agente — no comparan conversación contra conversación. Para detectar causalidad real habría que cruzar mensajes con frustración a nivel de hilo individual.</li>
              <li>Conforme se acumulen más corridas, los coeficientes se estabilizan y se vuelven interpretables. Hoy son sugerencias direccionales.</li>
            </ul>
          </div>
        </Section>
      );
    }

    // Coverage section — when do we have data up to per agent?
    function DataCoverageSection() {
      const today = new Date().toISOString().slice(0, 10);
      const daysSince = (date) => {
        const d1 = new Date(date);
        const d2 = new Date(today);
        return Math.floor((d2 - d1) / (1000 * 60 * 60 * 24));
      };
      const sorted = [...agentRanking].sort((a, b) => (b.lastSeen || '').localeCompare(a.lastSeen || ''));
      const fresh = sorted.filter(a => daysSince(a.lastSeen) <= 3).length;
      const stale = sorted.filter(a => daysSince(a.lastSeen) > 14).length;
      return (
        <Section title="Cobertura de Datos por Agente" id="coverage">
          <div className="grid grid-cols-1 sm:grid-cols-3 gap-5 mb-6">
            <div className="bg-white rounded-xl p-5 shadow-sm" style={{borderLeft: '4px solid #2EC4B6'}}>
              <div className="text-3xl font-extrabold text-teal">{fresh}</div>
              <div className="text-xs text-gray-500 mt-1">Agentes con datos recientes (≤3 días)</div>
            </div>
            <div className="bg-white rounded-xl p-5 shadow-sm" style={{borderLeft: '4px solid #F97316'}}>
              <div className="text-3xl font-extrabold text-orange-500">{sorted.length - fresh - stale}</div>
              <div className="text-xs text-gray-500 mt-1">Datos parciales (4-14 días)</div>
            </div>
            <div className="bg-white rounded-xl p-5 shadow-sm" style={{borderLeft: '4px solid #E8505B'}}>
              <div className="text-3xl font-extrabold text-coral">{stale}</div>
              <div className="text-xs text-gray-500 mt-1">Sin datos recientes ({'>'} 14 días)</div>
            </div>
          </div>
          <div className="bg-white rounded-xl shadow-sm overflow-hidden">
            <table className="w-full">
              <thead>
                <tr className="bg-navy-dark text-white">
                  <th className="py-3 px-4 text-left text-xs font-semibold">Agente</th>
                  <th className="py-3 px-4 text-center text-xs font-semibold">Última información</th>
                  <th className="py-3 px-4 text-center text-xs font-semibold">Días sin datos</th>
                  <th className="py-3 px-4 text-center text-xs font-semibold">Estado</th>
                </tr>
              </thead>
              <tbody>
                {sorted.map((a, i) => {
                  const days = daysSince(a.lastSeen);
                  const status = days <= 3 ? 'Fresco' : days <= 14 ? 'Parcial' : 'Desconectado';
                  const color = days <= 3 ? '#2EC4B6' : days <= 14 ? '#F97316' : '#E8505B';
                  const bg = days <= 3 ? '#D1FAE5' : days <= 14 ? '#FEF3C7' : '#FEE2E2';
                  const fmtDate = new Date(a.lastSeen).toLocaleDateString('es-MX', { day: 'numeric', month: 'short', year: 'numeric' });
                  return (
                    <tr key={i} className={`border-b border-gray-100 ${i % 2 === 0 ? 'bg-white' : 'bg-gray-50'}`}>
                      <td className="py-3 px-4 text-sm font-medium text-navy-dark">
                        {a.name}
                        {a.isBrandNew && <span className="ml-2 text-xs text-teal bg-teal/10 px-1.5 py-0.5 rounded">NUEVO</span>}
                      </td>
                      <td className="py-3 px-4 text-center text-sm text-gray-700">{fmtDate}</td>
                      <td className="py-3 px-4 text-center text-sm text-gray-500">{days} {days === 1 ? 'día' : 'días'}</td>
                      <td className="py-3 px-4 text-center">
                        <span className="inline-block text-xs font-bold px-2 py-0.5 rounded-full" style={{color, backgroundColor: bg}}>{status}</span>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
            <div className="px-4 py-3 bg-gray-50 border-t">
              <p className="text-xs text-gray-400">Fecha del último mensaje registrado en Evolution API · Si está desconectado, debe reconectarse en el manager para volver a recibir datos</p>
            </div>
          </div>
        </Section>
      );
    }

    // Tab navigation
    const TABS = [
      { id: 'overview',    label: 'Resumen',          icon: '📊' },
      { id: 'agents',      label: 'Tasa de Frustración', icon: '😤' },
      { id: 'resolution',  label: 'Resolución',       icon: '🎯' },
      { id: 'response',    label: 'Tiempo de Respuesta', icon: '⏱️' },
      { id: 'writing',     label: 'Escritura',        icon: '✍️' },
      { id: 'calls',       label: 'Llamadas',         icon: '📞' },
      { id: 'feedback',    label: 'Feedback',         icon: '📋' },
      { id: 'correlations',label: 'Correlaciones',    icon: '🔗' },
      { id: 'insights',    label: 'Insights y Mejoras', icon: '🔍' },
      { id: 'coverage',    label: 'Cobertura',        icon: '📡' },
    ];

    function TabBar({ active, onChange }) {
      return (
        <div className="sticky top-[73px] z-40" style={{background: 'rgba(250, 250, 247, 0.85)', backdropFilter: 'blur(20px)', WebkitBackdropFilter: 'blur(20px)', borderBottom: '1px solid rgba(15,26,51,0.06)'}}>
          <div className="max-w-7xl mx-auto px-3 sm:px-6 overflow-x-auto">
            <div className="flex gap-0.5 py-2.5">
              {TABS.map(t => {
                const isActive = active === t.id;
                return (
                  <button
                    key={t.id}
                    onClick={() => onChange(t.id)}
                    className={`group relative px-3.5 py-2 text-sm font-medium whitespace-nowrap rounded-lg transition-all duration-200 ${
                      isActive
                        ? 'text-navy-dark'
                        : 'text-gray-500 hover:text-navy-dark'
                    }`}
                    style={isActive ? {
                      background: 'rgba(15,26,51,0.06)',
                    } : undefined}
                  >
                    <span className="mr-1.5 opacity-90">{t.icon}</span>
                    <span className={isActive ? 'font-semibold' : ''}>{t.label}</span>
                    {isActive && (
                      <span className="absolute -bottom-0.5 left-1/2 -translate-x-1/2 w-1 h-1 rounded-full bg-coral"></span>
                    )}
                  </button>
                );
              })}
            </div>
          </div>
        </div>
      );
    }

    function App() {
      const [tab, setTab] = React.useState('overview');
      // Restore tab from URL hash on load
      React.useEffect(() => {
        const hash = window.location.hash.replace('#', '');
        if (hash && TABS.find(t => t.id === hash)) setTab(hash);
        const handler = () => {
          const h = window.location.hash.replace('#', '');
          if (h && TABS.find(t => t.id === h)) setTab(h);
        };
        window.addEventListener('hashchange', handler);
        return () => window.removeEventListener('hashchange', handler);
      }, []);
      const setTabAndHash = (id) => {
        setTab(id);
        window.location.hash = id;
        window.scrollTo({ top: 0, behavior: 'smooth' });
      };
      return (
        <div className="app-bg">
          <Header />
          <TabBar active={tab} onChange={setTabAndHash} />
          {tab === 'overview' && (
            <>
              <Hero />
              <KeyMetricsSummary onJump={setTabAndHash} />
              <StatsCards />
            </>
          )}
          {tab === 'agents' && <ComparisonSection />}
          {tab === 'resolution' && <ResolutionSection />}
          {tab === 'response' && <ResponseTimeSection />}
          {tab === 'writing' && <WritingQualitySection />}
          {tab === 'calls' && <CallsSection />}
          {tab === 'feedback' && <FeedbackSection />}
          {tab === 'correlations' && <CorrelationsSection />}
          {tab === 'insights' && (
            <>
              <EvolutionOfProblemsSection />
              <TopRequestsChart />
              <FrustrationOverview />
              <ImprovementAreasSection />
            </>
          )}
          {tab === 'coverage' && <DataCoverageSection />}
          <Footer />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
